<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A237E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icône vertèbre stylisée -->
  <g transform="translate(10, 10)">
    <!-- Vertèbre supérieure -->
    <rect x="15" y="5" width="50" height="16" rx="8" fill="url(#grad1)" />
    <!-- Corps vertébral central -->
    <rect x="10" y="28" width="60" height="24" rx="10" fill="url(#grad2)" />
    <!-- Processus épineux -->
    <rect x="33" y="18" width="14" height="14" rx="3" fill="#0D47A1" />
    <!-- Vertèbre inférieure -->
    <rect x="15" y="59" width="50" height="16" rx="8" fill="url(#grad1)" />
    <!-- Disque intervertébral sup -->
    <rect x="25" y="22" width="30" height="5" rx="2.5" fill="#E3F2FD" opacity="0.7" />
    <!-- Disque intervertébral inf -->
    <rect x="25" y="53" width="30" height="5" rx="2.5" fill="#E3F2FD" opacity="0.7" />
    <!-- Pédicules -->
    <circle cx="18" cy="40" r="6" fill="#1565C0" />
    <circle cx="62" cy="40" r="6" fill="#1565C0" />
  </g>

  <!-- Texte VERTEX -->
  <text x="100" y="58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800" letter-spacing="3">
    <tspan fill="url(#grad2)">VERT</tspan><tspan fill="#0D47A1">E</tspan><tspan fill="#1565C0">X</tspan>
  </text>

  <!-- Symbole © -->
  <text x="323" y="42" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0D47A1" font-weight="600">&#169;</text>

  <!-- Sous-titre -->
  <text x="100" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#666" letter-spacing="4" font-weight="500">FORMATIONS MÉDICALES</text>
</svg>
