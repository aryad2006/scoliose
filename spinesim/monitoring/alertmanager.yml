global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'vertex-alerts@example.com'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'

route:
  group_by: ['alertname', 'service']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical_team
      continue: true

    - match:
        severity: warning
      receiver: default

receivers:
  - name: default
    email_configs:
      - to: 'equipe@example.com'
        send_resolved: true
        headers:
          Subject: '[VERTEX] {{ .Status | toUpper }}: {{ .CommonAnnotations.summary }}'
        body: |
          {{ range .Alerts }}
          🔔 {{ .Annotations.summary }}
          {{ .Annotations.description }}
          Heure : {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          Labels : {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
          {{ end }}

  - name: critical_team
    email_configs:
      - to: 'ops-critical@example.com'
        send_resolved: true
        headers:
          Subject: '[VERTEX 🚨 CRITIQUE] {{ .CommonAnnotations.summary }}'
    webhook_configs:
      - url: '${SLACK_WEBHOOK_URL}'
        send_resolved: true
        http_config:
          bearer_token: '${SLACK_TOKEN}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
