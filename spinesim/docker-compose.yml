version: '3.8'

# VERTEX© — Docker Compose
# Simulateur biomécanique du rachis
# Virtual Environment for Rachis Training and EXploration

services:
  # ── Base de données PostgreSQL ──
  db:
    image: postgres:17-alpine
    container_name: vertex-db
    environment:
      POSTGRES_DB: vertex
      POSTGRES_USER: vertex
      POSTGRES_PASSWORD: vertex_secret
    ports:
      - "5432:5432"
    volumes:
      - vertex_pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./backend/sql/02_users.sql:/docker-entrypoint-initdb.d/02_users.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertex -d vertex"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend Julia ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vertex-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
    environment:
      - JULIA_NUM_THREADS=auto
      - VERTEX_PORT=8080
      - VERTEX_DB_HOST=db
      - VERTEX_DB_PORT=5432
      - VERTEX_DB_NAME=vertex
      - VERTEX_DB_USER=vertex
      - VERTEX_DB_PASSWORD=vertex_secret
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend Vue.js (dev) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vertex-frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    # VITE_API_URL n'est PAS défini ici : le proxy Vite (vite.config.js)
    # redirige /api → localhost:8080 depuis le navigateur.
    # Pour la production, utiliser le service nginx ci-dessous.
    restart: unless-stopped

  # ── Reverse Proxy Nginx (production) ──
  nginx:
    image: nginx:alpine
    container_name: vertex-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - gateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── API Gateway Python/FastAPI ──
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: vertex-gateway
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_PORT=8000
      - JULIA_BACKEND_URL=http://backend:8080
      - FEBIO_URL=http://febio:8081
      - JWT_SECRET=${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_USE_A_256_BIT_KEY}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3001"]
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=vertex
      - DB_USER=vertex
      - DB_PASSWORD=vertex_secret
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # ── Service FEBio (solveur FEM tétraédrique) ──
  febio:
    build:
      context: ./febio
      dockerfile: Dockerfile
    container_name: vertex-febio
    ports:
      - "8081:8081"
    volumes:
      - ./febio/meshes:/app/meshes:ro
    environment:
      - FEBIO_WORKSPACE=/tmp/febio_workspace
      - FEBIO_BIN=/usr/local/bin/febio4
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

volumes:
  vertex_pgdata:
    driver: local
