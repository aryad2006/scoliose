version: "3.9"

# VERTEX© — Surcharge production
# Usage : docker compose -f ../docker-compose.yml -f docker-compose.prod.yml up -d
#
# Ce fichier SURCHARGE le docker-compose.yml principal :
#   - supprime les build contexts (images depuis registry)
#   - restart: always
#   - ressources limitées
#   - secrets depuis .env.production

x-common-prod: &common-prod
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

services:

  # ── Base de données ──────────────────────────────────────────────────────────
  db:
    <<: *common-prod
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus:   "1.0"

  # ── Backend Julia ─────────────────────────────────────────────────────────────
  backend:
    <<: *common-prod
    image: ${REGISTRY}/vertex-backend:${VERSION:-latest}
    environment:
      JULIA_NUM_THREADS: "4"
      DB_HOST:           db
      DB_PORT:           "5432"
      DB_NAME:           ${POSTGRES_DB}
      DB_USER:           ${POSTGRES_USER}
      DB_PASSWORD:       ${POSTGRES_PASSWORD}
      JWT_SECRET:        ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus:   "4.0"
      replicas: 1

  # ── Gateway FastAPI ───────────────────────────────────────────────────────────
  gateway:
    <<: *common-prod
    image: ${REGISTRY}/vertex-gateway:${VERSION:-latest}
    environment:
      ENVIRONMENT:             production
      JWT_SECRET:              ${JWT_SECRET}
      JULIA_BACKEND_URL:       http://backend:8765
      FEBIO_SERVICE_URL:       http://febio:8081
      CORS_ORIGINS:            ${CORS_ORIGINS}
      STRIPE_SECRET_KEY:       ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PUBLISHABLE_KEY:  ${STRIPE_PUBLISHABLE_KEY}
      REDIS_URL:               redis://redis:6379/0
    depends_on:
      - backend
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
          cpus:   "1.0"
      replicas: 2   # 2 instances pour la HA

  # ── Frontend Vue.js (servi statiquement par Nginx) ────────────────────────────
  frontend:
    <<: *common-prod
    image: ${REGISTRY}/vertex-frontend:${VERSION:-latest}
    # En prod, Nginx sert les fichiers statiques buildés
    environment:
      VITE_API_BASE: ${CORS_ORIGINS}

  # ── FEBio Service ─────────────────────────────────────────────────────────────
  febio:
    <<: *common-prod
    image: ${REGISTRY}/vertex-febio:${VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus:   "2.0"

  # ── Nginx (reverse proxy SSL) ─────────────────────────────────────────────────
  nginx:
    <<: *common-prod
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/certs:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - gateway
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus:   "0.5"

  # ── Redis (cache + sessions) ──────────────────────────────────────────────────
  redis:
    <<: *common-prod
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus:   "0.5"

  # ── Certbot (renouvellement SSL) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./ssl/certs:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  db_data:
  redis_data:
  certbot_data:
