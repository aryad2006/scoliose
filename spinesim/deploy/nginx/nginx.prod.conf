worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logs
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  sendfile    on;
  tcp_nopush  on;
  gzip        on;
  gzip_types  text/plain text/css application/json application/javascript text/xml application/xml;

  # Sécurité
  server_tokens off;
  add_header X-Frame-Options          "DENY";
  add_header X-Content-Type-Options   "nosniff";
  add_header X-XSS-Protection         "1; mode=block";
  add_header Referrer-Policy          "strict-origin-when-cross-origin";
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()";
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS VERTEX ───────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name vertex.example.com;

    ssl_certificate     /etc/nginx/ssl/live/vertex.example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vertex.example.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    # ── Frontend statique ────────────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend:80;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Cache pour les assets statiques
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_pass http://frontend:80;
      }
    }

    # ── API Gateway ──────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=40 nodelay;

      proxy_pass         http://gateway:8000/api/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;    # Simulations peuvent être longues
      proxy_send_timeout 30s;
    }

    # ── Auth (rate limit strict) ─────────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=10;
      proxy_pass http://gateway:8000/api/auth/;
      proxy_set_header Host $host;
    }

    # ── Stripe webhook (pas de rate limit agressif) ──────────────────────────
    location /api/payment/webhook {
      proxy_pass         http://gateway:8000/api/payment/webhook;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 30s;
    }

    # ──Healthcheck ──────────────────────────────────────────────────────────
    location /health {
      proxy_pass         http://gateway:8000/health;
      access_log         off;
    }
  }
}
