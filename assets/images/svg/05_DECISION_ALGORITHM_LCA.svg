<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <defs>
    <style>
      .box-start { fill: #3498db; stroke: #2980b9; }
      .box-decision { fill: #f39c12; stroke: #e67e22; }
      .box-action { fill: #27ae60; stroke: #229954; }
      .box-risk { fill: #e74c3c; stroke: #c0392b; }
      .text-white { fill: white; font-weight: bold; font-size: 13px; }
      .text-dark { fill: #1a1a1a; font-size: 12px; }
      .text-label { fill: #34495e; font-size: 11px; }
      .arrow { stroke: #2c3e50; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50"/>
    </marker>
  </defs>

  <text x="700" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Algorithme Décisionnel — ACL Natif vs Reconstruction
  </text>

  <!-- START -->
  <rect x="550" y="60" width="300" height="50" class="box-start" rx="8"/>
  <text x="700" y="92" text-anchor="middle" class="text-white">Suspicion Rupture LCA</text>

  <!-- Arrow down -->
  <line x1="700" y1="110" x2="700" y2="140" class="arrow"/>

  <!-- Examen Clinique -->
  <rect x="500" y="140" width="400" height="70" class="box-decision" rx="8"/>
  <text x="700" y="163" text-anchor="middle" class="text-white">Examen Clinique</text>
  <text x="700" y="185" text-anchor="middle" class="text-label">Lachman, Anterior Drawer, Pivot-Shift</text>
  <text x="700" y="200" text-anchor="middle" class="text-label">→ Sensibilité ~90% si rupture complète</text>

  <!-- Arrow down -->
  <line x1="700" y1="210" x2="700" y2="240" class="arrow"/>

  <!-- IRM -->
  <rect x="520" y="240" width="360" height="60" class="box-decision" rx="8"/>
  <text x="700" y="268" text-anchor="middle" class="text-white">Confirmation IRM 3D</text>
  <text x="700" y="288" text-anchor="middle" class="text-label">Diagnostic rupture, ménisques, cartilage</text>

  <!-- Arrow down -->
  <line x1="700" y1="300" x2="700" y2="330" class="arrow"/>

  <!-- MESURE PTS - CRITIQUE -->
  <rect x="470" y="330" width="460" height="80" class="box-risk" rx="8" stroke-width="3"/>
  <text x="700" y="358" text-anchor="middle" class="text-white">⚠️ MESURE PTS SUR RADIOGRAPHIE LATÉRALE ⚠️</text>
  <text x="700" y="380" text-anchor="middle" class="text-label">Méthode Dejour : angle cortex postérieur tibia vs horizontale</text>
  <text x="700" y="397" text-anchor="middle" class="text-label">Cet angle détermine la stratégie chirurgicale complète</text>

  <!-- Arrow down -->
  <line x1="700" y1="410" x2="700" y2="440" class="arrow"/>

  <!-- DECISION TREE - 3 branches -->
  <g>
    <!-- Branche 1: PTS ≤ 10° (VERT) -->
    <rect x="80" y="440" width="280" height="60" class="box-action" rx="8"/>
    <text x="220" y="468" text-anchor="middle" class="text-white">PTS ≤ 10° (Normal)</text>
    <text x="220" y="488" text-anchor="middle" class="text-label">Risque rupture baseline</text>

    <line x1="220" y1="500" x2="220" y2="540" class="arrow"/>
    <rect x="100" y="540" width="240" height="90" class="box-action" rx="8"/>
    <text x="220" y="565" text-anchor="middle" class="text-white">RECONSTRUCTION SIMPLE</text>
    <text x="220" y="585" text-anchor="middle" class="text-label">Single-Bundle ou Double-Bundle</text>
    <text x="220" y="602" text-anchor="middle" class="text-label">Greffon hamstring/patellar</text>
    <text x="220" y="618" text-anchor="middle" class="text-label">Suivi clinique classique</text>

    <!-- Branche 2: PTS 10-12° (ORANGE) -->
    <rect x="440" y="440" width="280" height="60" class="box-decision" rx="8"/>
    <text x="580" y="468" text-anchor="middle" class="text-white">PTS 10-12° (Borderline)</text>
    <text x="580" y="488" text-anchor="middle" class="text-label">Risque modéré (+50%)</text>

    <line x1="580" y1="500" x2="580" y2="540" class="arrow"/>
    <rect x="460" y="540" width="240" height="90" class="box-decision" rx="8"/>
    <text x="580" y="565" text-anchor="middle" class="text-white">RECONSTRUCTION + SURVEILLANCE</text>
    <text x="580" y="585" text-anchor="middle" class="text-label">Double-Bundle préféré</text>
    <text x="580" y="602" text-anchor="middle" class="text-label">Renforcement neuromusculaire</text>
    <text x="580" y="618" text-anchor="middle" class="text-label">Suivi strict 12 mois</text>

    <!-- Branche 3: PTS > 12° (ROUGE) -->
    <rect x="800" y="440" width="280" height="60" class="box-risk" rx="8"/>
    <text x="940" y="468" text-anchor="middle" class="text-white">PTS > 12° (Élevé)</text>
    <text x="940" y="488" text-anchor="middle" class="text-label">Risque rupture ×2.3 à ×4</text>

    <line x1="940" y1="500" x2="940" y2="540" class="arrow"/>
    <rect x="820" y="540" width="240" height="110" class="box-risk" rx="8" stroke-width="2"/>
    <text x="940" y="568" text-anchor="middle" class="text-white">CORRECTION PENTE REQUISE</text>
    <text x="940" y="588" text-anchor="middle" class="text-label">Option 1: Déflexion PUIS reco (2-3m)</text>
    <text x="940" y="604" text-anchor="middle" class="text-label">Option 2: DB + déflexion simultané</text>
    <text x="940" y="620" text-anchor="middle" class="text-label">Option 3: Déflexion seule si patient</text>
    <text x="940" y="635" text-anchor="middle" class="text-label">refuse reco (Dejour technique)</text>
  </g>

  <!-- Footer -->
  <rect x="50" y="750" width="1300" height="120" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="5"/>
  <text x="700" y="775" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Points Clés Décisionnels :
  </text>
  <text x="70" y="800" font-size="11" fill="#34495e">
    • Brandon 2006 (NP II): PTS >12° = OR 2.3 rupture LCA natif vs normal
  </text>
  <text x="70" y="820" font-size="11" fill="#34495e">
    • Christensen 2017 (NP I meta-analyse): Seuil 12° universel toutes populations
  </text>
  <text x="70" y="840" font-size="11" fill="#34495e">
    • Independance PTS vs notch (r=0.1-0.2) mais triple risque si PTS + notch étroit + varus = très élevé
  </text>
  <text x="70" y="858" font-size="11" fill="#34495e">
    • Prévention neuromusculaire critique si PTS >10°. Re-rupture post-reco: 35% si PTS>12° vs 8% si <12° (Webb 2013)
  </text>
</svg>
