<svg width="1000" height="900" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900">
  <!-- Title -->
  <text x="500" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Algorithme Décisionnel LCA — Du Diagnostic à la Chirurgie
  </text>

  <!-- Define arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#009900"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#cc0000"/>
    </marker>
  </defs>

  <!-- START: Patient with anterior knee pain -->
  <rect x="350" y="80" width="300" height="60" fill="#ffffcc" stroke="#ff9900" stroke-width="2" rx="8"/>
  <text x="500" y="105" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Patient : Douleur antérieure genou</text>
  <text x="500" y="125" font-size="11" text-anchor="middle" fill="#333">(ou instabilité rapportée)</text>

  <!-- Arrow down -->
  <line x1="500" y1="140" x2="500" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- CLINICAL EXAM -->
  <rect x="320" y="180" width="360" height="90" fill="#e8f4f8" stroke="#0066cc" stroke-width="2" rx="8"/>
  <text x="500" y="205" font-size="12" font-weight="bold" text-anchor="middle" fill="#003366">EXAMEN CLINIQUE :</text>
  <text x="340" y="225" font-size="10" fill="#003366">• Lachman test (60-90° flexion) — SENSIBILITÉ 85%</text>
  <text x="340" y="240" font-size="10" fill="#003366">• Anterior drawer test (90° flexion) — SPÉCIFICITÉ 95%</text>
  <text x="340" y="255" font-size="10" fill="#003366">• Pivot-shift test (flexion-extension) — PATHOGNOMONIQUE si positif</text>

  <!-- Arrow down -->
  <line x1="500" y1="270" x2="500" y2="310" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- IMAGING: X-RAY MEASUREMENT -->
  <rect x="300" y="310" width="400" height="110" fill="#f0e8ff" stroke="#9933cc" stroke-width="2" rx="8"/>
  <text x="500" y="335" font-size="12" font-weight="bold" text-anchor="middle" fill="#663366">RADIOGRAPHIES SIMPLES (Bilan initial) :</text>
  <text x="320" y="355" font-size="10" fill="#663366">• Mesurer PTS (angle pente tibiale) — Dejour method</text>
  <text x="320" y="370" font-size="10" fill="#663366">• Mesurer axe mécanique (MA) — para-articulaire vs intra-articulaire</text>
  <text x="320" y="385" font-size="10" fill="#663366">• Évaluer morphologie plateau tibial (profondeur, pentes latérale/médiale)</text>
  <text x="320" y="400" font-size="10" fill="#663366">• Résumé : Baseline axes, PTS pour stratégie reconstruction</text>

  <!-- DECISION POINT 1: PTS LEVEL -->
  <line x1="500" y1="420" x2="500" y2="460" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Diamond: PTS assessment -->
  <polygon points="500,490 570,530 500,570 430,530" fill="#fff4e6" stroke="#ff9900" stroke-width="2"/>
  <text x="500" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">PTS ?</text>

  <!-- LEFT BRANCH: PTS < 12° (Normal/Moderate) -->
  <line x1="430" y1="530" x2="280" y2="530" stroke="#009900" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="340" y="520" font-size="10" font-weight="bold" fill="#009900">PTS < 12°</text>

  <rect x="140" y="480" width="280" height="100" fill="#e6ffe6" stroke="#009900" stroke-width="2" rx="8"/>
  <text x="280" y="505" font-size="11" font-weight="bold" text-anchor="middle" fill="#003300">RECONSTRUCTION LCA STANDARD</text>
  <text x="160" y="525" font-size="10" fill="#003300">• Double-bundle or single-bundle</text>
  <text x="160" y="540" font-size="10" fill="#003300">• Greffon : auto-hamstring préféré</text>
  <text x="160" y="555" font-size="10" fill="#003300">• Succès ~90-95% à 5 ans</text>

  <!-- RIGHT BRANCH: PTS ≥ 12° (Elevated) -->
  <line x1="570" y1="530" x2="720" y2="530" stroke="#cc0000" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="650" y="520" font-size="10" font-weight="bold" fill="#cc0000">PTS ≥ 12°</text>

  <rect x="580" y="480" width="280" height="100" fill="#ffe6e6" stroke="#cc0000" stroke-width="2" rx="8"/>
  <text x="720" y="505" font-size="11" font-weight="bold" text-anchor="middle" fill="#660000">RECONSTRUCTION + PTS CORRECTION</text>
  <text x="600" y="525" font-size="10" fill="#660000">• LCA reconstruction + tibial slope reduction</text>
  <text x="600" y="540" font-size="10" fill="#660000">• Deflexion technique (Dejour approach)</text>
  <text x="600" y="555" font-size="10" fill="#660000">• Reduce PTS to < 10° intra-operatively</text>

  <!-- MRI DETAILED ASSESSMENT (both branches converge) -->
  <line x1="280" y1="580" x2="380" y2="630" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="720" y1="580" x2="620" y2="630" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="300" y="630" width="400" height="120" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="8"/>
  <text x="500" y="655" font-size="12" font-weight="bold" text-anchor="middle" fill="#003366">BILAN IMAGERIE DÉTAILLÉ (IRM/TDM 3D) :</text>
  <text x="320" y="675" font-size="10" fill="#003366">• IRM 3D : mesure PTS précision ±1° (ICC 0.95 vs 0.88 radio)</text>
  <text x="320" y="690" font-size="10" fill="#003366">• Évaluer dégâts cartilage (chondropathie OA précoce)</text>
  <text x="320" y="705" font-size="10" fill="#003366">• Morphologie ménisque (dégâts méniscaux associés 30-40%)</text>
  <text x="320" y="720" font-size="10" fill="#003366">• 3D planning : guide pour technique, alignement, taille greffon</text>
  <text x="320" y="735" font-size="10" fill="#003366">• TDM pour chirurgie correction axe (raro-varo associated)</text>

  <!-- Arrow convergence -->
  <line x1="500" y1="750" x2="500" y2="790" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- FINAL DECISION -->
  <rect x="320" y="790" width="360" height="85" fill="#ffffcc" stroke="#ff9900" stroke-width="2" rx="8"/>
  <text x="500" y="815" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">DÉCISION CHIRURGICALE FINALE :</text>
  <text x="340" y="835" font-size="10" fill="#1a1a1a">✓ Type reconstruction (mono/double bundle, auto/allo)</text>
  <text x="340" y="850" font-size="10" fill="#1a1a1a">✓ Correction PTS ? (si ≥12°) — timing (1-stage vs 2-stage)</text>
  <text x="340" y="865" font-size="10" fill="#1a1a1a">✓ Technique guidage (arthroscopique, pSI, robotique)</text>

  <!-- Footnote -->
  <text x="50" y="890" font-size="9" font-style="italic" fill="#666">
    Sources : Brandon 2006 (PTS risk OR 2.3), Dejour (deflexion technique), Rivière 2020 (rKA standard), Howell 2019 (LCA outcomes)
  </text>
</svg>