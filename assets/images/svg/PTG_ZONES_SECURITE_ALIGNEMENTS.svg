<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="700" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="500" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#000">
    PTG - Zones de Sécurité: MA vs KA vs rKA
  </text>

  <!-- Three columns for three alignment philosophies -->

  <!-- COLUMN 1: MECHANICAL AXIS (MA) -->
  <g id="ma-section">
    <rect x="20" y="70" width="300" height="600" fill="#e8f4f8" stroke="#0288d1" stroke-width="2" rx="5"/>

    <text x="170" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#0288d1">
      MECHANICAL AXIS (MA)
    </text>
    <text x="170" y="120" font-size="12" text-anchor="middle" fill="#555">Standard traditional</text>

    <!-- Tibia diagram -->
    <line x1="170" y1="150" x2="170" y2="350" stroke="#333" stroke-width="6"/>
    <ellipse cx="170" cy="140" rx="15" ry="10" fill="#ccc" stroke="#333" stroke-width="2"/>
    <rect x="155" y="320" width="30" height="40" fill="#999" stroke="#333" stroke-width="2"/>

    <!-- MA line (neutral) -->
    <line x1="170" y1="130" x2="170" y2="370" stroke="#0288d1" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="185" y="250" font-size="11" fill="#0288d1" font-weight="bold">Axe mécanique 0°</text>

    <!-- Target zone box -->
    <rect x="145" y="305" width="50" height="35" fill="none" stroke="#0288d1" stroke-width="2" rx="3"/>
    <text x="170" y="328" font-size="10" text-anchor="middle" fill="#0288d1" font-weight="bold">TARGET</text>

    <!-- Clinical data -->
    <text x="30" y="400" font-size="11" font-weight="bold" fill="#000">Caractéristiques:</text>
    <text x="30" y="420" font-size="10" fill="#333">✓ Survie 20+ ans</text>
    <text x="30" y="435" font-size="10" fill="#333">✓ Fiable, prouvé</text>
    <text x="30" y="450" font-size="10" fill="#333">✗ ROM limité</text>
    <text x="30" y="465" font-size="10" fill="#333">✗ Satisf. 75-80%</text>

    <text x="30" y="490" font-size="11" font-weight="bold" fill="#000">Zone MA:</text>
    <text x="30" y="507" font-size="10" fill="#333">0° à 3° varus</text>
  </g>

  <!-- COLUMN 2: KINEMATIC ALIGNMENT (KA) -->
  <g id="ka-section">
    <rect x="350" y="70" width="300" height="600" fill="#f0e8f8" stroke="#7b1fa2" stroke-width="2" rx="5"/>

    <text x="500" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#7b1fa2">
      KINEMATIC ALIGNMENT (KA)
    </text>
    <text x="500" y="120" font-size="12" text-anchor="middle" fill="#555">Patient native anatomy</text>

    <!-- Tibia diagram -->
    <line x1="500" y1="150" x2="520" y2="350" stroke="#333" stroke-width="6"/>
    <ellipse cx="510" cy="140" rx="15" ry="10" fill="#ccc" stroke="#333" stroke-width="2"/>
    <rect x="510" y="320" width="30" height="40" fill="#999" stroke="#333" stroke-width="2"/>

    <!-- KA line (variable, valgus) -->
    <line x1="510" y1="130" x2="535" y2="375" stroke="#7b1fa2" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="450" y="250" font-size="11" fill="#7b1fa2" font-weight="bold">Native PTS</text>
    <text x="450" y="265" font-size="11" fill="#7b1fa2" font-weight="bold">(7° typique)</text>

    <!-- Target zone - variable -->
    <path d="M 510 305 L 530 310 L 525 340 L 505 335 Z"
          fill="#7b1fa2" opacity="0.2" stroke="#7b1fa2" stroke-width="2"/>
    <text x="515" y="325" font-size="10" text-anchor="middle" fill="#7b1fa2" font-weight="bold">ZONE</text>

    <!-- Clinical data -->
    <text x="365" y="400" font-size="11" font-weight="bold" fill="#000">Caractéristiques:</text>
    <text x="365" y="420" font-size="10" fill="#333">✓ Meilleur ROM</text>
    <text x="365" y="435" font-size="10" fill="#333">✓ Satisf. 85-90%</text>
    <text x="365" y="450" font-size="10" fill="#333">✗ Données 20ans ?</text>
    <text x="365" y="465" font-size="10" fill="#333">✗ Cas spécifiques</text>

    <text x="365" y="490" font-size="11" font-weight="bold" fill="#000">Zone KA:</text>
    <text x="365" y="507" font-size="10" fill="#333">Varié (-2° à 10°)</text>
  </g>

  <!-- COLUMN 3: RESTRICTED KA (rKA) -->
  <g id="rka-section">
    <rect x="680" y="70" width="300" height="600" fill="#e8f8e8" stroke="#388e3c" stroke-width="2" rx="5"/>

    <text x="830" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">
      RESTRICTED KA (rKA)
    </text>
    <text x="830" y="120" font-size="12" text-anchor="middle" fill="#555">Native within safe zone</text>

    <!-- Tibia diagram -->
    <line x1="830" y1="150" x2="848" y2="350" stroke="#333" stroke-width="6"/>
    <ellipse cx="840" cy="140" rx="15" ry="10" fill="#ccc" stroke="#333" stroke-width="2"/>
    <rect x="840" y="320" width="30" height="40" fill="#999" stroke="#333" stroke-width="2"/>

    <!-- rKA line (bounded valgus) -->
    <line x1="840" y1="130" x2="860" y2="375" stroke="#388e3c" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="770" y="250" font-size="11" fill="#388e3c" font-weight="bold">Native PTS</text>
    <text x="770" y="265" font-size="11" fill="#388e3c" font-weight="bold">capped at 9°</text>

    <!-- Target zone - bounded -->
    <rect x="840" y="305" width="22" height="35" fill="#388e3c" opacity="0.2"
          stroke="#388e3c" stroke-width="2" rx="2"/>
    <text x="851" y="328" font-size="9" text-anchor="middle" fill="#388e3c" font-weight="bold">SAFE</text>

    <!-- Clinical data -->
    <text x="695" y="400" font-size="11" font-weight="bold" fill="#000">Caractéristiques:</text>
    <text x="695" y="420" font-size="10" fill="#333">✓ ROM amélioré</text>
    <text x="695" y="435" font-size="10" fill="#333">✓ Sécurité garantie</text>
    <text x="695" y="450" font-size="10" fill="#333">✓ Émergent 2020+</text>
    <text x="695" y="465" font-size="10" fill="#333">✓ Balance optimale</text>

    <text x="695" y="490" font-size="11" font-weight="bold" fill="#000">Zone rKA:</text>
    <text x="695" y="507" font-size="10" fill="#333">3° à 9° valgus</text>
  </g>

  <!-- Decision algorithm at bottom -->
  <rect x="20" y="550" width="960" height="140" fill="#fffacd" stroke="#f39c12" stroke-width="2" rx="5"/>
  <text x="50" y="575" font-size="13" font-weight="bold" fill="#000">ALGORITHME DÉCISION CLINIQUE:</text>

  <text x="50" y="595" font-size="11" fill="#333">
    • Patient PTS NATIF < 9°? → KA libre possible (meilleure satisfaction)
  </text>
  <text x="50" y="612" font-size="11" fill="#333">
    • Patient PTS NATIF 9-12°? → rKA RECOMMANDÉ (cap à 9°, sécurité garantie)
  </text>
  <text x="50" y="629" font-size="11" fill="#333">
    • Patient PTS NATIF > 12°? → MA STANDARD (proven long-term, ou ostéotomie préalable)
  </text>
  <text x="50" y="646" font-size="11" fill="#333">
    • Patient age > 70 + OA sévère? → MA standard (fiabilité éprouvée, priorité survie implant)
  </text>
  <text x="50" y="663" font-size="11" fill="#333">
    • Chirurgien inexperimenté KA? → MA = safer option jusqu'à maîtrise technique
  </text>
</svg>