<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <text x="700" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Techniques Reconstruction LCA : SB vs DB vs Hybrid
  </text>

  <!-- SB Column -->
  <g>
    <rect x="50" y="80" width="400" height="800" fill="#f0f3f4" stroke="#34495e" stroke-width="2" rx="8"/>
    <text x="250" y="115" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">Single-Bundle (SB)</text>
    <circle cx="250" cy="200" r="50" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <line x1="250" y1="150" x2="250" y2="250" stroke="#3498db" stroke-width="4"/>
    <text x="250" y="310" font-size="11" text-anchor="middle" fill="#34495e">Un seul greffon (AL)</text>
    <text x="70" y="350" font-size="11" font-weight="bold" fill="#27ae60">Avantages :</text>
    <text x="70" y="370" font-size="10" fill="#555">• Technique simple</text>
    <text x="70" y="388" font-size="10" fill="#555">• Un seul tunnel</text>
    <text x="70" y="406" font-size="10" fill="#555">• Courbe apprentissage</text>
    <text x="70" y="424" font-size="10" fill="#555">• Coût réduit</text>
    <text x="70" y="460" font-size="11" font-weight="bold" fill="#e74c3c">Inconvénients :</text>
    <text x="70" y="480" font-size="10" fill="#555">• Contrôle rotationnel ↓</text>
    <text x="70" y="498" font-size="10" fill="#555">• Re-rupture si PTS>12°</text>
    <text x="70" y="516" font-size="10" fill="#555">• Laxité pivot-shift</text>
    <text x="70" y="545" font-size="11" font-weight="bold" fill="#3498db">Indications :</text>
    <text x="70" y="565" font-size="10" fill="#555">• Sédentaires</text>
    <text x="70" y="583" font-size="10" fill="#555">• PTS less10°</text>
    <text x="70" y="601" font-size="10" fill="#555">• Patients âgés</text>
    <rect x="70" y="640" width="330" height="50" fill="#e8f4f8" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="235" y="660" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">Survie 10ans</text>
    <text x="235" y="680" font-size="13" font-weight="bold" text-anchor="middle" fill="#3498db">85-90%</text>
  </g>

  <!-- DB Column (PRIORITAIRE) -->
  <g>
    <rect x="500" y="80" width="400" height="800" fill="#e8f8f5" stroke="#27ae60" stroke-width="3" rx="8"/>
    <text x="700" y="115" font-size="16" font-weight="bold" text-anchor="middle" fill="#229954">Double-Bundle (DB) ⭐</text>
    <text x="700" y="135" font-size="10" text-anchor="middle" fill="#27ae60">RÉFÉRENCE STANDARD</text>
    <circle cx="700" cy="200" r="50" fill="#e8f4f8" stroke="#27ae60" stroke-width="2"/>
    <line x1="700" y1="150" x2="680" y2="250" stroke="#3498db" stroke-width="4"/>
    <line x1="700" y1="150" x2="720" y2="250" stroke="#9b59b6" stroke-width="4"/>
    <text x="700" y="310" font-size="11" text-anchor="middle" fill="#34495e">Deux faisceaux (AL+PL)</text>
    <text x="520" y="350" font-size="11" font-weight="bold" fill="#27ae60">Avantages :</text>
    <text x="520" y="370" font-size="10" fill="#555">• Contrôle rotationnel ++</text>
    <text x="520" y="388" font-size="10" fill="#555">• Stabilité optimale</text>
    <text x="520" y="406" font-size="10" fill="#555">• Meilleurs outcomes</text>
    <text x="520" y="424" font-size="10" fill="#555">• Retour sport facilité</text>
    <text x="520" y="442" font-size="10" fill="#555">• Préféré si PTS 10-12°</text>
    <text x="520" y="475" font-size="11" font-weight="bold" fill="#e74c3c">Inconvénients :</text>
    <text x="520" y="495" font-size="10" fill="#555">• Deux tunnels + complexe</text>
    <text x="520" y="513" font-size="10" fill="#555">• Greffons plus petits</text>
    <text x="520" y="531" font-size="10" fill="#555">• Durée opératoire +30m</text>
    <text x="520" y="549" font-size="10" fill="#555">• Coût légèrement +</text>
    <text x="520" y="582" font-size="11" font-weight="bold" fill="#27ae60">Indications :</text>
    <text x="520" y="602" font-size="10" fill="#555">• Athlètes pivotants</text>
    <text x="520" y="620" font-size="10" fill="#555">• PTS 10-12° ← PRIORITÉ</text>
    <text x="520" y="638" font-size="10" fill="#555">• Jeunes actifs less40ans</text>
    <rect x="520" y="680" width="330" height="50" fill="#e8f8f5" stroke="#27ae60" stroke-width="2" rx="3"/>
    <text x="685" y="700" font-size="12" font-weight="bold" text-anchor="middle" fill="#229954">Survie 10ans</text>
    <text x="685" y="720" font-size="13" font-weight="bold" text-anchor="middle" fill="#27ae60">92-95%</text>
  </g>

  <!-- Hybrid Column -->
  <g>
    <rect x="950" y="80" width="400" height="800" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="8"/>
    <text x="1150" y="115" font-size="16" font-weight="bold" text-anchor="middle" fill="#d68910">Hybrid (SB+)</text>
    <text x="1150" y="135" font-size="10" text-anchor="middle" fill="#f39c12">INTERMÉDIAIRE</text>
    <circle cx="1150" cy="200" r="50" fill="#fff3cd" stroke="#f39c12" stroke-width="2"/>
    <line x1="1150" y1="150" x2="1150" y2="250" stroke="#3498db" stroke-width="4"/>
    <line x1="1100" y1="200" x2="1200" y2="200" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="1150" y="310" font-size="11" text-anchor="middle" fill="#34495e">Principal + renforts</text>
    <text x="970" y="350" font-size="11" font-weight="bold" fill="#27ae60">Avantages :</text>
    <text x="970" y="370" font-size="10" fill="#555">• Rotationnel vs SB</text>
    <text x="970" y="388" font-size="10" fill="#555">• Moins complexe DB</text>
    <text x="970" y="406" font-size="10" fill="#555">• Greffon plus gros</text>
    <text x="970" y="424" font-size="10" fill="#555">• Compromis gain/complexity</text>
    <text x="970" y="460" font-size="11" font-weight="bold" fill="#e74c3c">Inconvénients :</text>
    <text x="970" y="480" font-size="10" fill="#555">• Résultats entre SB/DB</text>
    <text x="970" y="498" font-size="10" fill="#555">• Moins validé que DB</text>
    <text x="970" y="516" font-size="10" fill="#555">• Technique variable</text>
    <text x="970" y="552" font-size="11" font-weight="bold" fill="#f39c12">Indications :</text>
    <text x="970" y="572" font-size="10" fill="#555">• Sportifs modérés</text>
    <text x="970" y="590" font-size="10" fill="#555">• PTS 10-12° (alternatif)</text>
    <text x="970" y="608" font-size="10" fill="#555">• Si greffon limite</text>
    <rect x="970" y="650" width="330" height="50" fill="#fff9e6" stroke="#f39c12" stroke-width="1" rx="3"/>
    <text x="1135" y="670" font-size="12" font-weight="bold" text-anchor="middle" fill="#d68910">Survie 10ans</text>
    <text x="1135" y="690" font-size="13" font-weight="bold" text-anchor="middle" fill="#f39c12">88-92%</text>
  </g>

  <!-- Footer -->
  <rect x="50" y="850" width="1300" height="40" fill="#e8f4f8" stroke="#3498db" stroke-width="2" rx="5"/>
  <text x="700" y="873" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    RECOMMANDATION : Double-Bundle standard pour PTS 10-12° ou athlètes pivotants. Évaluer PTS avant choix technique.
  </text>
</svg>
