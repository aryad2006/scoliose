<svg width="1100" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800">
  <!-- Title -->
  <text x="550" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Techniques Chirurgicales LCA — Comparaison Approches Arthroscopiques
  </text>

  <!-- === TECHNIQUE 1: SINGLE-BUNDLE (SB) === -->
  <g id="sb-technique">
    <rect x="50" y="80" width="300" height="650" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="8"/>

    <text x="200" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#003366">Single-Bundle (SB)</text>

    <!-- Anterior view of tibia -->
    <rect x="80" y="140" width="240" height="200" fill="#e8d4c4" stroke="#333" stroke-width="2" rx="5"/>
    <text x="200" y="165" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Vue antérieure tibia</text>

    <!-- Single tunnel -->
    <circle cx="200" cy="280" r="8" fill="#cc0000" stroke="#660000" stroke-width="2"/>
    <text x="200" y="320" font-size="10" text-anchor="middle" fill="#333">Tunnel antéro-médial</text>
    <text x="200" y="335" font-size="10" text-anchor="middle" fill="#333">(single graft)</text>

    <!-- Graft route -->
    <line x1="200" y1="280" x2="200" y2="400" stroke="#cc0000" stroke-width="3" stroke-dasharray="3,3"/>
    <text x="215" y="345" font-size="9" fill="#cc0000" font-weight="bold">Greffon</text>

    <!-- Advantages -->
    <rect x="70" y="430" width="260" height="130" fill="#e6ffe6" stroke="#009900" stroke-width="2" rx="5"/>
    <text x="90" y="450" font-size="10" font-weight="bold" fill="#003300">✓ Avantages :</text>
    <text x="90" y="468" font-size="9" fill="#003300">• Technique simple (apprentissage rapide)</text>
    <text x="90" y="483" font-size="9" fill="#003300">• Moins invasif (1 tunnel)</text>
    <text x="90" y="498" font-size="9" fill="#003300">• Temps opératoire plus court</text>
    <text x="90" y="513" font-size="9" fill="#003300">• Coût réduit vs DB</text>
    <text x="90" y="528" font-size="9" fill="#003300">• Bonne efficacité (90-95% @ 5y)</text>

    <!-- Disadvantages -->
    <rect x="70" y="570" width="260" height="130" fill="#ffe6e6" stroke="#cc0000" stroke-width="2" rx="5"/>
    <text x="90" y="590" font-size="10" font-weight="bold" fill="#660000">✗ Inconvénients :</text>
    <text x="90" y="608" font-size="9" fill="#660000">• Moins de stabilité tibiale interne</text>
    <text x="90" y="623" font-size="9" fill="#660000">• Contrôle rotation mediocre</text>
    <text x="90" y="638" font-size="9" fill="#660000">• Moins adapté PTS élevée</text>
    <text x="90" y="653" font-size="9" fill="#660000">• Taux révision légèrement plus haut</text>
    <text x="90" y="668" font-size="9" fill="#660000">• Moins "proprioceptif" (1 bundle)</text>
  </g>

  <!-- === TECHNIQUE 2: DOUBLE-BUNDLE (DB) === -->
  <g id="db-technique">
    <rect x="400" y="80" width="300" height="650" fill="#fff0f8" stroke="#ff6699" stroke-width="2" rx="8"/>

    <text x="550" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#660066">Double-Bundle (DB)</text>

    <!-- Anterior view of tibia -->
    <rect x="430" y="140" width="240" height="200" fill="#e8d4c4" stroke="#333" stroke-width="2" rx="5"/>
    <text x="550" y="165" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Vue antérieure tibia</text>

    <!-- Double tunnels -->
    <circle cx="520" cy="270" r="7" fill="#ff6699" stroke="#cc0066" stroke-width="2"/>
    <text x="520" y="295" font-size="9" text-anchor="middle" fill="#333">Antéro-</text>
    <text x="520" y="307" font-size="9" text-anchor="middle" fill="#333">médial</text>

    <circle cx="580" cy="290" r="7" fill="#ff6699" stroke="#cc0066" stroke-width="2"/>
    <text x="580" y="315" font-size="9" text-anchor="middle" fill="#333">Postéro-</text>
    <text x="580" y="327" font-size="9" text-anchor="middle" fill="#333">latéral</text>

    <!-- Graft routes (diverging) -->
    <line x1="520" y1="270" x2="520" y2="400" stroke="#ff6699" stroke-width="2" stroke-dasharray="3,3"/>
    <line x1="580" y1="290" x2="580" y2="400" stroke="#ff6699" stroke-width="2" stroke-dasharray="3,3"/>

    <!-- Advantages -->
    <rect x="420" y="430" width="260" height="130" fill="#e6ffe6" stroke="#009900" stroke-width="2" rx="5"/>
    <text x="440" y="450" font-size="10" font-weight="bold" fill="#003300">✓ Avantages :</text>
    <text x="440" y="468" font-size="9" fill="#003300">• Stabilité supérieure (2 bundles)</text>
    <text x="440" y="483" font-size="9" fill="#003300">• Meilleur contrôle rotation</text>
    <text x="440" y="498" font-size="9" fill="#003300">• Adaptation PTS élevée</text>
    <text x="440" y="513" font-size="9" fill="#003300">• Cinématique plus physiologique</text>
    <text x="440" y="528" font-size="9" fill="#003300">• Taux révision plus bas (long-term)</text>

    <!-- Disadvantages -->
    <rect x="420" y="570" width="260" height="130" fill="#ffe6e6" stroke="#cc0000" stroke-width="2" rx="5"/>
    <text x="440" y="590" font-size="10" font-weight="bold" fill="#660000">✗ Inconvénients :</text>
    <text x="440" y="608" font-size="9" fill="#660000">• Technique complexe (apprentissage)</text>
    <text x="440" y="623" font-size="9" fill="#660000">• 2 tunnels → plus invasif</text>
    <text x="440" y="638" font-size="9" fill="#660000">• Temps opératoire plus long (+15-20min)</text>
    <text x="440" y="653" font-size="9" fill="#660000">• Coût supérieur (équipement, greffon)</text>
    <text x="440" y="668" font-size="9" fill="#660000">• Différence @ 5y vs SB : marginal</text>
  </g>

  <!-- === TECHNIQUE 3: HYBRID (Modified DB) === -->
  <g id="hybrid-technique">
    <rect x="750" y="80" width="300" height="650" fill="#f5f5f5" stroke="#999" stroke-width="2" rx="8"/>

    <text x="900" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Hybrid / Modified</text>

    <!-- Anterior view of tibia -->
    <rect x="780" y="140" width="240" height="200" fill="#e8d4c4" stroke="#333" stroke-width="2" rx="5"/>
    <text x="900" y="165" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Vue antérieure tibia</text>

    <!-- Hybrid approach (1.5 bundles or offset) -->
    <circle cx="900" cy="280" r="9" fill="#999" stroke="#666" stroke-width="2"/>
    <text x="900" y="315" font-size="10" text-anchor="middle" fill="#333">Positionnement</text>
    <text x="900" y="330" font-size="10" text-anchor="middle" fill="#333">optimisé (PTS)</text>

    <!-- Single large graft with offset -->
    <line x1="900" y1="280" x2="900" y2="400" stroke="#999" stroke-width="3" stroke-dasharray="3,3"/>

    <!-- Considerations -->
    <rect x="780" y="430" width="240" height="130" fill="#f9f9f9" stroke="#999" stroke-width="2" rx="5"/>
    <text x="800" y="450" font-size="10" font-weight="bold" fill="#333">Approche mixte :</text>
    <text x="800" y="468" font-size="9" fill="#333">• SB classique</text>
    <text x="800" y="483" font-size="9" fill="#333">• + positionnement antéro-médial</text>
    <text x="800" y="498" font-size="9" fill="#333">  optimisé pour PTS/axe</text>
    <text x="800" y="513" font-size="9" fill="#333">• Compromis : efficacité DB</text>
    <text x="800" y="528" font-size="9" fill="#333">  + simplicité SB</text>

    <!-- Outcome -->
    <rect x="780" y="570" width="240" height="130" fill="#fffacd" stroke="#ff9900" stroke-width="2" rx="5"/>
    <text x="800" y="590" font-size="10" font-weight="bold" fill="#663300">Résultats cliniques :</text>
    <text x="800" y="608" font-size="9" fill="#663300">• 91-94% @ 5 années</text>
    <text x="800" y="623" font-size="9" fill="#663300">• Similar SB/DB outcomes</text>
    <text x="800" y="638" font-size="9" fill="#663300">• Technique en vogue</text>
    <text x="800" y="653" font-size="9" fill="#663300">• Guidage navigation/robot</text>
    <text x="800" y="668" font-size="9" fill="#663300">  permet optimisation 3D</text>
  </g>

  <!-- === SUMMARY TABLE === -->
  <rect x="50" y="760" width="1000" height="35" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>

  <text x="70" y="785" font-size="10" fill="#003366">
    <tspan font-weight="bold">Consensus actuel :</tspan> SB = choix standard (efficace, simple) | DB = si PTS élevée ou instabilité rotation majeure | Hybrid = compromis moderne avec guidage
  </text>
</svg>