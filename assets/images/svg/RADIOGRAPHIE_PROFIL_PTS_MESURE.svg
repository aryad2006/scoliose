<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f0f0"/>

  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">
    Radiographie Latérale - Mesure de la Pente Tibiale (PTS)
  </text>

  <!-- Anatomical structures (simplified knee lateral view) -->
  <g id="knee-anatomy">
    <!-- Femur -->
    <path d="M 200 150 Q 220 200 230 300" stroke="#333" stroke-width="8" fill="none"/>

    <!-- Tibial plateau -->
    <ellipse cx="280" cy="320" rx="80" ry="20" fill="none" stroke="#333" stroke-width="3"/>
    <line x1="220" y1="320" x2="340" y2="320" stroke="#333" stroke-width="8"/>

    <!-- Tibial shaft -->
    <path d="M 280 340 L 300 500" stroke="#333" stroke-width="8" fill="none"/>

    <!-- Fibula -->
    <path d="M 320 350 L 340 500" stroke="#666" stroke-width="6" fill="none"/>

    <!-- Meniscus lateral -->
    <path d="M 240 310 Q 280 330 340 315" stroke="#999" stroke-width="4" fill="none"/>
  </g>

  <!-- AXIS 1: Tibial longitudinal axis (ATC) -->
  <g id="tibial-axis" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5">
    <line x1="285" y1="350" x2="295" y2="490"/>
    <text x="310" y="420" font-size="14" fill="#e74c3c" font-weight="bold">Axe tibial (ATC)</text>
  </g>

  <!-- AXIS 2: Perpendicular line -->
  <g id="perpendicular" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5">
    <line x1="200" y1="340" x2="330" y2="340"/>
    <text x="320" y="365" font-size="14" fill="#3498db" font-weight="bold">⊥ Perpendiculaire</text>
  </g>

  <!-- AXIS 3: Tibial plateau line -->
  <g id="plateau-line" stroke="#2ecc71" stroke-width="2">
    <line x1="200" y1="315" x2="350" y2="330"/>
    <text x="360" y="330" font-size="14" fill="#2ecc71" font-weight="bold">Plateau tibial</text>
  </g>

  <!-- ANGLE ARC and measurement -->
  <g id="angle-measurement">
    <!-- Arc showing angle -->
    <path d="M 285 340 A 40 40 0 0 1 305 325"
          fill="none" stroke="#f39c12" stroke-width="3"/>

    <!-- Angle value box -->
    <rect x="240" y="250" width="120" height="60" fill="#f39c12" opacity="0.2"
          stroke="#f39c12" stroke-width="2" rx="5"/>
    <text x="300" y="275" font-size="28" font-weight="bold" text-anchor="middle" fill="#f39c12">
      PTS = 10°
    </text>
    <text x="300" y="300" font-size="12" text-anchor="middle" fill="#333">
      (Normal: 7-12°)
    </text>
  </g>

  <!-- Anatomical labels -->
  <g id="labels" font-size="12" fill="#333">
    <text x="150" y="180">Fémur</text>
    <text x="280" y="290">Plateau tibial</text>
    <text x="300" y="380">Tibia</text>
    <text x="340" y="420">Fibula</text>
  </g>

  <!-- Clinical notes -->
  <rect x="20" y="450" width="760" height="120" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="30" y="475" font-size="13" font-weight="bold" fill="#000">POINTS CLÉS MESURE:</text>
  <text x="30" y="495" font-size="11" fill="#333">
    • Ligne 1: Tangente au cortex antérieur tibia (ATC) = axe tibial
  </text>
  <text x="30" y="510" font-size="11" fill="#333">
    • Ligne 2: Perpendiculaire à ligne 1
  </text>
  <text x="30" y="525" font-size="11" fill="#333">
    • Ligne 3: Tangente au plateau tibial postérieur
  </text>
  <text x="30" y="540" font-size="11" fill="#333">
    • Angle = intersection lignes 2 et 3 | Normal: 7-12° | Risque LCA: >12°
  </text>
  <text x="30" y="555" font-size="11" fill="#333">
    • Mesure sur RADIOGRAPHIE PROFIL (latéral strict) - PAS de face (AP)
  </text>
</svg>