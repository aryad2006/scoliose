<svg width="1000" height="650" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <!-- Title -->
  <text x="500" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Distribution Angle PTS — Population Normale vs Risque LCA Rupture
  </text>

  <!-- === HISTOGRAM: PTS DISTRIBUTION === -->
  <!-- Axes -->
  <line x1="100" y1="500" x2="900" y2="500" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="500" x2="100" y2="80" stroke="#333" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="40" y="300" font-size="12" font-weight="bold" fill="#333" text-anchor="middle" transform="rotate(-90 40 300)">
    Fréquence (%)
  </text>

  <!-- X-axis label -->
  <text x="500" y="540" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">
    Angle de Pente Tibiale (PTS) — Degrés
  </text>

  <!-- X-AXIS SCALE -->
  <line x1="100" y1="500" x2="100" y2="505" stroke="#333" stroke-width="1"/>
  <text x="100" y="525" font-size="10" text-anchor="middle" fill="#333">0°</text>

  <line x1="200" y1="500" x2="200" y2="505" stroke="#333" stroke-width="1"/>
  <text x="200" y="525" font-size="10" text-anchor="middle" fill="#333">4°</text>

  <line x1="300" y1="500" x2="300" y2="505" stroke="#333" stroke-width="1"/>
  <text x="300" y="525" font-size="10" text-anchor="middle" fill="#333">7° (normal)</text>

  <line x1="400" y1="500" x2="400" y2="505" stroke="#333" stroke-width="1"/>
  <text x="400" y="525" font-size="10" text-anchor="middle" fill="#333">10°</text>

  <line x1="500" y1="500" x2="500" y2="505" stroke="#333" stroke-width="1"/>
  <text x="500" y="525" font-size="10" text-anchor="middle" fill="#333">12°</text>

  <line x1="600" y1="500" x2="600" y2="505" stroke="#333" stroke-width="1"/>
  <text x="600" y="525" font-size="10" text-anchor="middle" fill="#333">15°</text>

  <line x1="700" y1="500" x2="700" y2="505" stroke="#333" stroke-width="1"/>
  <text x="700" y="525" font-size="10" text-anchor="middle" fill="#333">18°</text>

  <line x1="800" y1="500" x2="800" y2="505" stroke="#333" stroke-width="1"/>
  <text x="800" y="525" font-size="10" text-anchor="middle" fill="#333">20°+</text>

  <!-- Y-AXIS SCALE -->
  <line x1="95" y1="500" x2="100" y2="500" stroke="#333" stroke-width="1"/>
  <text x="85" y="505" font-size="10" text-anchor="end" fill="#333">0%</text>

  <line x1="95" y1="400" x2="100" y2="400" stroke="#333" stroke-width="1"/>
  <text x="85" y="405" font-size="10" text-anchor="end" fill="#333">10%</text>

  <line x1="95" y1="300" x2="100" y2="300" stroke="#333" stroke-width="1"/>
  <text x="85" y="305" font-size="10" text-anchor="end" fill="#333">20%</text>

  <line x1="95" y1="200" x2="100" y2="200" stroke="#333" stroke-width="1"/>
  <text x="85" y="205" font-size="10" text-anchor="end" fill="#333">30%</text>

  <line x1="95" y1="100" x2="100" y2="100" stroke="#333" stroke-width="1"/>
  <text x="85" y="105" font-size="10" text-anchor="end" fill="#333">40%</text>

  <!-- Grid lines -->
  <line x1="100" y1="300" x2="900" y2="300" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="200" x2="900" y2="200" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="100" x2="900" y2="100" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- === NORMAL POPULATION HISTOGRAM (CAUCASIAN) === -->
  <!-- Data from Dejour et al. and Hashemi studies -->

  <!-- 0-2° : 3% -->
  <rect x="130" y="491" width="30" height="9" fill="#99ccff" stroke="#0066cc" stroke-width="1"/>

  <!-- 2-4° : 8% -->
  <rect x="160" y="480" width="30" height="20" fill="#99ccff" stroke="#0066cc" stroke-width="1"/>

  <!-- 4-6° : 22% -->
  <rect x="190" y="420" width="30" height="80" fill="#99ccff" stroke="#0066cc" stroke-width="1"/>

  <!-- 6-8° : 35% -->
  <rect x="220" y="340" width="30" height="160" fill="#99ccff" stroke="#0066cc" stroke-width="1" stroke-width="2"/>
  <text x="235" y="410" font-size="9" font-weight="bold" fill="#003366" text-anchor="middle">35%</text>

  <!-- 8-10° : 20% -->
  <rect x="250" y="420" width="30" height="80" fill="#99ccff" stroke="#0066cc" stroke-width="1"/>

  <!-- 10-12° : 8% -->
  <rect x="280" y="480" width="30" height="20" fill="#ffff99" stroke="#ff9900" stroke-width="1"/>

  <!-- 12-14° : 3% -->
  <rect x="310" y="491" width="30" height="9" fill="#ffff99" stroke="#ff9900" stroke-width="1"/>

  <!-- 14-16° : 1% -->
  <rect x="340" y="496" width="30" height="4" fill="#ffcccc" stroke="#cc0000" stroke-width="1"/>

  <!-- Normal distribution curve overlay -->
  <path d="M 130 490 Q 180 350 230 340 Q 280 350 330 475" fill="none" stroke="#0066cc" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="350" y="345" font-size="10" font-weight="bold" fill="#0066cc">Distribution normale</text>
  <text x="350" y="360" font-size="9" fill="#0066cc">(Caucasiens)</text>

  <!-- === ASIAN POPULATION (Overlay comparison) === -->
  <path d="M 150 480 Q 200 330 280 315 Q 330 330 360 475" fill="none" stroke="#ff6600" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="380" y="315" font-size="10" font-weight="bold" fill="#ff6600">Asiatiques</text>
  <text x="380" y="330" font-size="9" fill="#ff6600">(shift +1.5°)</text>

  <!-- === RISK ZONES === -->
  <!-- Normal zone (< 10°) -->
  <rect x="100" y="80" width="200" height="420" fill="#99ff99" opacity="0.15"/>
  <text x="120" y="110" font-size="10" font-weight="bold" fill="#003300">ZONE NORMALE</text>
  <text x="120" y="125" font-size="9" fill="#003300">(PTS < 10°)</text>
  <text x="120" y="140" font-size="8" fill="#003300">Risque: FAIBLE</text>

  <!-- Borderline zone (10-12°) -->
  <rect x="300" y="80" width="100" height="420" fill="#ffff99" opacity="0.15"/>
  <text x="315" y="110" font-size="10" font-weight="bold" fill="#996600">ZONE LIMITE</text>
  <text x="315" y="125" font-size="9" fill="#996600">(PTS 10-12°)</text>
  <text x="315" y="140" font-size="8" fill="#996600">Risque: MODÉRÉ</text>

  <!-- High risk zone (≥ 12°) -->
  <rect x="400" y="80" width="500" height="420" fill="#ff9999" opacity="0.15"/>
  <text x="420" y="110" font-size="10" font-weight="bold" fill="#660000">ZONE À RISQUE ÉLEVÉ</text>
  <text x="420" y="125" font-size="9" fill="#660000">(PTS ≥ 12°)</text>
  <text x="420" y="140" font-size="8" fill="#660000">Risque: ÉLEVÉ (OR 2.3)</text>

  <!-- === STATISTICS BOX === -->
  <rect x="50" y="560" width="900" height="75" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="8"/>

  <text x="70" y="585" font-size="12" font-weight="bold" fill="#003366">DONNÉES ÉPIDÉMIOLOGIQUES & IMPLICATIONS :</text>

  <text x="70" y="610" font-size="10" fill="#003366">
    <tspan font-weight="bold">Caucasiens :</tspan> PTS moyenne 7° ± 2.1° (70% entre 4-10°) |
    <tspan font-weight="bold">Asiatiques :</tspan> PTS moyenne 8.5° ± 2.5° (shift ethnique +1.5°) — Hashemi 2008
  </text>

  <text x="70" y="630" font-size="10" fill="#003366">
    <tspan font-weight="bold">Seuil critique :</tspan> PTS ≥ 12° → OR rupture LCA 2.3 (Brandon 2006, 1,433 knees) |
    <tspan font-weight="bold">Implication :</tspan> 15-20% population à risque élevé → dépistage et prévention pertinents
  </text>
</svg>