<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800">
  <text x="700" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Distribution PTS Population + Zones de Risque
  </text>

  <!-- AXES -->
  <line x1="150" y1="700" x2="1200" y2="700" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="700" x2="150" y2="100" stroke="#333" stroke-width="2"/>

  <!-- Étiquettes axes -->
  <text x="1240" y="710" font-size="13" fill="#333" font-weight="bold">PTS (degrés)</text>
  <text x="100" y="90" font-size="13" fill="#333" font-weight="bold">Fréquence (%)</text>

  <!-- Graduations X -->
  <text x="170" y="725" font-size="11" fill="#666">0°</text>
  <text x="350" y="725" font-size="11" fill="#666">5°</text>
  <text x="530" y="725" font-size="11" fill="#666">10°</text>
  <text x="710" y="725" font-size="11" fill="#666">12°</text>
  <text x="890" y="725" font-size="11" fill="#666">15°</text>
  <text x="1070" y="725" font-size="11" fill="#666">20°</text>

  <!-- Graduations Y -->
  <text x="130" y="710" font-size="10" fill="#666">0</text>
  <text x="130" y="600" font-size="10" fill="#666">10</text>
  <text x="130" y="490" font-size="10" fill="#666">20</text>
  <text x="130" y="380" font-size="10" fill="#666">30</text>

  <!-- Zones de risque en arrière-plan -->
  <rect x="150" y="100" width="380" height="600" fill="#e8f8f5" opacity="0.5"/>
  <text x="340" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#27ae60" opacity="0.7">ZONE NORMALE</text>
  <text x="340" y="440" font-size="10" text-anchor="middle" fill="#27ae60" opacity="0.7">&lt; 10°</text>

  <rect x="530" y="100" width="180" height="600" fill="#fff9e6" opacity="0.5"/>
  <text x="620" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#f39c12" opacity="0.7">BORDERLINE</text>
  <text x="620" y="440" font-size="10" text-anchor="middle" fill="#f39c12" opacity="0.7">10-12°</text>

  <rect x="710" y="100" width="450" height="600" fill="#fadbd8" opacity="0.5"/>
  <text x="935" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#e74c3c" opacity="0.7">ZONE À RISQUE ÉLEVÉ</text>
  <text x="935" y="440" font-size="10" text-anchor="middle" fill="#e74c3c" opacity="0.7">&gt; 12° (Seuil critique)</text>

  <!-- Courbe distribution (courbe normale approximée) -->
  <polyline points="
    170,680 180,675 190,665 200,650 210,630 220,605 230,580 240,550 250,520 260,485 
    270,450 280,415 290,385 300,360 310,345 320,335 330,330 340,330 350,335 360,345 
    370,360 380,380 390,405 400,435 410,470 420,510 430,555 440,600 450,645 460,680 
    470,705 480,720 490,725 500,720 510,705 520,680 530,640 540,580 550,500 560,400 
    570,300 580,200 590,120 600,80 610,70 620,80 630,120 640,200 650,300 660,400 670,500 
    680,580 690,640 700,680 710,705 720,720 730,725 740,720 750,705 760,680 770,645 780,600 
    790,555 800,510 810,470 820,435 830,405 840,380 850,360 860,345 870,335 880,330 890,330 
    900,335 910,345 920,360 930,385 940,415 950,450 960,485 970,520 980,550 990,580 1000,605 
    1010,630 1020,650 1030,665 1040,675 1050,680" 
    stroke="#2ecc71" stroke-width="4" fill="none"/>

  <!-- Lignes de seuil -->
  <line x1="530" y1="100" x2="530" y2="700" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  <line x1="710" y1="100" x2="710" y2="700" stroke="#e74c3c" stroke-width="3" stroke-dasharray="5,5" opacity="0.8"/>

  <!-- Annotations seuils -->
  <circle cx="530" cy="400" r="3" fill="#f39c12"/>
  <text x="530" y="750" font-size="11" font-weight="bold" text-anchor="middle" fill="#f39c12">10°</text>

  <circle cx="710" cy="400" r="3" fill="#e74c3c"/>
  <text x="710" y="750" font-size="11" font-weight="bold" text-anchor="middle" fill="#e74c3c">12° SEUIL</text>

  <!-- Statistiques -->
  <g id="stats">
    <rect x="1100" y="100" width="280" height="200" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2" rx="5"/>
    
    <text x="1240" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Statistiques Populationales</text>
    
    <text x="1110" y="155" font-size="11" fill="#34495e">PTS Moyenne : 7-8° (±3°)</text>
    <text x="1110" y="175" font-size="11" fill="#34495e">% PTS &lt;10° : 70%</text>
    <text x="1110" y="195" font-size="11" fill="#34495e">% PTS 10-12° : 20%</text>
    <text x="1110" y="215" font-size="11" fill="#34495e">% PTS >12° : 10%</text>

    <line x1="1100" y1="230" x2="1380" y2="230" stroke="#95a5a6" stroke-width="1"/>

    <text x="1110" y="250" font-size="10" fill="#e74c3c" font-weight="bold">Risque Rupture LCA :</text>
    <text x="1110" y="268" font-size="10" fill="#34495e">PTS &lt;10° : baseline (OR=1)</text>
    <text x="1110" y="285" font-size="10" fill="#34495e">PTS 10-12° : ×1.5-2</text>
    <text x="1110" y="302" font-size="10" fill="#e74c3c" font-weight="bold">PTS >12° : ×2.3-4</text>
  </g>

  <!-- Légende bas -->
  <rect x="50" y="760" width="1300" height="30" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
  <text x="700" y="782" font-size="11" text-anchor="middle" fill="#34495e">
    Distribution normalisée sur 1000+ sujets sains (Christensen 2017, N=15 études meta-analyse). Seuil 12° est le breakpoint universel identifié dans ~70% des études.
  </text>
</svg>
