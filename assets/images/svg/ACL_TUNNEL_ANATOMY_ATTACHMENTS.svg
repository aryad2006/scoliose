<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="700" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="500" y="35" font-size="26" font-weight="bold" text-anchor="middle" fill="#000">
    Anatomie LCA - Attachements Fibreux &amp; Zones Critiques
  </text>

  <!-- LEFT SIDE: Femoral attachment -->
  <g id="femoral-section">
    <rect x="20" y="70" width="450" height="600" fill="#ffe8e8" stroke="#d32f2f" stroke-width="2" rx="5"/>

    <text x="245" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#d32f2f">
      ATTACHEMENT FÉMORAL (Lateral wall)
    </text>

    <!-- Femoral condyle diagram -->
    <ellipse cx="245" cy="220" rx="120" ry="100" fill="#ddd" stroke="#333" stroke-width="2"/>

    <!-- ACL fiber bundle origins -->
    <g id="acl-fibers-femoral">
      <!-- AM bundle -->
      <circle cx="200" cy="180" r="25" fill="#e74c3c" opacity="0.7" stroke="#c0392b" stroke-width="2"/>
      <text x="200" y="188" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">AM</text>
      <text x="200" y="210" font-size="10" text-anchor="middle" fill="#d32f2f">Antéromédial</text>

      <!-- PL bundle -->
      <circle cx="280" cy="160" r="25" fill="#3498db" opacity="0.7" stroke="#2980b9" stroke-width="2"/>
      <text x="280" y="168" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">PL</text>
      <text x="280" y="190" font-size="10" text-anchor="middle" fill="#2980b9">Postérolatéral</text>

      <!-- Intermediate fibers -->
      <circle cx="240" cy="140" r="18" fill="#f39c12" opacity="0.6" stroke="#e67e22" stroke-width="2"/>
      <text x="240" y="148" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">INT</text>
    </g>

    <!-- Anatomical landmark -->
    <text x="245" y="330" font-size="12" font-weight="bold" fill="#000">Notch anatomy:</text>
    <text x="245" y="348" font-size="11" fill="#333">• Resident's ridge (landmark)</text>
    <text x="245" y="363" font-size="11" fill="#333">• Medial wall concave</text>
    <text x="245" y="378" font-size="11" fill="#333">• Lateral wall convex</text>
    <text x="245" y="393" font-size="11" fill="#333">• Blumensaat's line ref</text>

    <!-- Zone specification -->
    <rect x="50" y="430" width="390" height="120" fill="#fff9c4" stroke="#f57f17" stroke-width="1" rx="3"/>
    <text x="60" y="450" font-size="11" font-weight="bold" fill="#000">ZONE OPTIMALE TUNNEL FÉMORAL:</text>
    <text x="60" y="468" font-size="10" fill="#333">
      • Centré entre AM-PL fibers (converge point)
    </text>
    <text x="60" y="483" font-size="10" fill="#333">
      • 25-30% from medial wall (avoid medial impingement)
    </text>
    <text x="60" y="498" font-size="10" fill="#333">
      • At or anterior to resident's ridge
    </text>
    <text x="60" y="513" font-size="10" fill="#333">
      • Depth: 25-35mm (graft length consideration)
    </text>
    <text x="60" y="528" font-size="10" fill="#333">
      • ERROR: Trop antérieur = impingement antérieur | Trop postérieur = laxité résiduelle
    </text>
  </g>

  <!-- RIGHT SIDE: Tibial attachment -->
  <g id="tibial-section">
    <rect x="530" y="70" width="450" height="600" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>

    <text x="755" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#388e3c">
      ATTACHEMENT TIBIAL (ACL footprint)
    </text>

    <!-- Tibial plateau superior view -->
    <ellipse cx="755" cy="240" rx="130" ry="90" fill="#ddd" stroke="#333" stroke-width="2"/>

    <!-- Anatomical landmarks -->
    <line x1="640" y1="240" x2="870" y2="240" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="755" y1="160" x2="755" y2="320" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

    <text x="880" y="245" font-size="9" fill="#666">Medial-Lateral</text>
    <text x="630" y="155" font-size="9" fill="#666">Anterior</text>

    <!-- ACL footprint zone -->
    <rect x="700" y="210" width="90" height="60" fill="#4caf50" opacity="0.5" stroke="#388e3c" stroke-width="2" rx="3"/>
    <text x="745" y="242" font-size="12" font-weight="bold" text-anchor="middle" fill="#1b5e20">ACL</text>
    <text x="745" y="257" font-size="10" font-weight="bold" text-anchor="middle" fill="#1b5e20">Zone</text>

    <!-- PCL attachment (reference) -->
    <circle cx="710" cy="305" r="20" fill="none" stroke="#2196f3" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="710" y="312" font-size="9" text-anchor="middle" fill="#2196f3">PCL</text>
    <text x="710" y="330" font-size="9" text-anchor="middle" fill="#2196f3">(reference)</text>

    <!-- IT band / fibular collateral ligament attachments -->
    <circle cx="830" cy="210" r="18" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="830" y="208" font-size="8" text-anchor="middle" fill="#ff9800">ITB</text>

    <!-- Anatomical measurements -->
    <text x="560" y="350" font-size="12" font-weight="bold" fill="#000">Footprint dimensions:</text>
    <text x="560" y="368" font-size="11" fill="#333">• Anteroposterior: 15-20mm</text>
    <text x="560" y="383" font-size="11" fill="#333">• Mediolateral: 25-30mm</text>
    <text x="560" y="398" font-size="11" fill="#333">• ~45-50% posterior slope</text>

    <!-- Zone specification -->
    <rect x="560" y="430" width="390" height="120" fill="#fff9c4" stroke="#f57f17" stroke-width="1" rx="3"/>
    <text x="570" y="450" font-size="11" font-weight="bold" fill="#000">ZONE OPTIMALE TUNNEL TIBIAL:</text>
    <text x="570" y="468" font-size="10" fill="#333">
      • Centré dans footprint ACL natif (follows anatomy)
    </text>
    <text x="570" y="483" font-size="10" fill="#333">
      • 8-10mm anterior to PCL (avoid posterior impingement)
    </text>
    <text x="570" y="498" font-size="10" fill="#333">
      • 5-7mm medial to lateral wall (avoid cortex)
    </text>
    <text x="570" y="513" font-size="10" fill="#333">
      • Orientation: follows native slope (PTS consideration critical!)
    </text>
    <text x="570" y="528" font-size="10" fill="#333">
      • ERROR: Trop postérieur = impingement PCL | Trop antérieur = roof impingement
    </text>
  </g>

  <!-- Bottom: PTS IMPACT -->
  <rect x="20" y="680" width="960" height="10" fill="#ff5252" stroke="#c62828" stroke-width="1"/>
  <text x="50" y="545" font-size="12" font-weight="bold" fill="#d32f2f">
    ⚠️ IMPACT PTS ÉLEVÉE SUR TUNNELS:
  </text>
  <text x="50" y="565" font-size="10" fill="#c62828">
    PTS > 12° = tibial tunnel orientation trop en flexion postérieure → augmente vecteur shear antérieur → tension excessive sur greffon → rupture récidivante
  </text>
</svg>