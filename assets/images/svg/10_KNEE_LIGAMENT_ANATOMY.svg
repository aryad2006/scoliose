<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <text x="600" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Anatomie Ligaments Genou — Vue Antérieure et Sagittale
  </text>

  <!-- VUE ANTÉRIEURE -->
  <g>
    <text x="300" y="80" font-size="14" font-weight="bold" fill="#34495e">Vue Antérieure</text>
    
    <!-- Fémur -->
    <rect x="250" y="100" width="100" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="5"/>
    <text x="300" y="145" font-size="11" font-weight="bold" text-anchor="middle" fill="#34495e">Fémur</text>
    
    <!-- Tibia -->
    <rect x="250" y="280" width="100" height="120" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="5"/>
    <text x="300" y="345" font-size="11" font-weight="bold" text-anchor="middle" fill="#34495e">Tibia</text>
    
    <!-- LCA (Anterior) -->
    <line x1="280" y1="180" x2="280" y2="280" stroke="#3498db" stroke-width="4"/>
    <text x="250" y="235" font-size="10" fill="#3498db" font-weight="bold">LCA</text>
    <text x="220" y="255" font-size="9" fill="#3498db">Antérieur</text>
    
    <!-- LCP (Posterior) -->
    <line x1="320" y1="180" x2="320" y2="280" stroke="#9b59b6" stroke-width="4"/>
    <text x="335" y="235" font-size="10" fill="#9b59b6" font-weight="bold">LCP</text>
    <text x="330" y="255" font-size="9" fill="#9b59b6">Postérieur</text>
    
    <!-- LCM (Médial) -->
    <line x1="250" y1="230" x2="200" y2="230" stroke="#2ecc71" stroke-width="3"/>
    <text x="200" y="220" font-size="9" fill="#2ecc71" font-weight="bold">LCM</text>
    <text x="180" y="235" font-size="8" fill="#2ecc71">Collatéral M</text>
    
    <!-- LCL (Latéral) -->
    <line x1="350" y1="230" x2="400" y2="230" stroke="#e74c3c" stroke-width="3"/>
    <text x="405" y="220" font-size="9" fill="#e74c3c" font-weight="bold">LCL</text>
    <text x="390" y="235" font-size="8" fill="#e74c3c">Collatéral L</text>
  </g>

  <!-- VUE SAGITTALE (LATÉRALE) -->
  <g>
    <text x="900" y="80" font-size="14" font-weight="bold" fill="#34495e">Vue Sagittale (Côté)</text>
    
    <!-- Fémur -->
    <ellipse cx="900" cy="140" rx="50" ry="40" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <text x="900" y="145" font-size="10" font-weight="bold" text-anchor="middle" fill="#34495e">Fémur</text>
    
    <!-- Tibia -->
    <ellipse cx="900" cy="300" rx="50" ry="30" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <text x="900" y="305" font-size="10" font-weight="bold" text-anchor="middle" fill="#34495e">Tibia</text>
    
    <!-- LCA -->
    <line x1="880" y1="180" x2="900" y2="270" stroke="#3498db" stroke-width="4"/>
    <text x="860" y="225" font-size="10" fill="#3498db" font-weight="bold">LCA</text>
    
    <!-- LCP -->
    <line x1="920" y1="180" x2="900" y2="270" stroke="#9b59b6" stroke-width="4"/>
    <text x="930" y="225" font-size="10" fill="#9b59b6" font-weight="bold">LCP</text>
    
    <!-- Ménisque -->
    <ellipse cx="900" cy="270" rx="35" ry="15" fill="#bdc3c7" opacity="0.6"/>
    <text x="900" y="275" font-size="9" text-anchor="middle" fill="#2c3e50">Ménisque</text>
    
    <!-- Tendon patellaire -->
    <line x1="900" y1="330" x2="900" y2="380" stroke="#f39c12" stroke-width="3"/>
    <text x="920" y="355" font-size="9" fill="#f39c12">Tendon</text>
    <text x="920" y="370" font-size="9" fill="#f39c12">patellaire</text>
  </g>

  <!-- Légende détaillée -->
  <g>
    <rect x="50" y="450" width="1100" height="320" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="5"/>
    
    <text x="600" y="480" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
      Structures Ligamentaires Clés
    </text>
    
    <!-- Row 1 -->
    <text x="70" y="520" font-size="11" font-weight="bold" fill="#3498db">LCA (Ligament Croisé Antérieur) :</text>
    <text x="70" y="540" font-size="10" fill="#34495e">Attaches fémorales (condyle médial externe) → tibiales (aire 1-2 intercondylienne) | Longueur ~35mm</text>
    <text x="70" y="557" font-size="10" fill="#34495e">Fonction : Prévient translation tibia antérieure, stabilité rotationnelle (pivot-shift) | Tension AUGMENTÉE si PTS >12°</text>
    
    <!-- Row 2 -->
    <text x="70" y="590" font-size="11" font-weight="bold" fill="#9b59b6">LCP (Ligament Croisé Postérieur) :</text>
    <text x="70" y="610" font-size="10" fill="#34495e">Attaches fémorales (condyle latéral) → tibiales (fosse intercondylienne) | Plus robuste que LCA</text>
    <text x="70" y="627" font-size="10" fill="#34495e">Fonction : Prévient translation tibia postérieure, stabilité postérieure (drawer) | Rarement rompu seul</text>
    
    <!-- Row 3 -->
    <text x="70" y="660" font-size="11" font-weight="bold" fill="#2ecc71">LCM (Ligament Collatéral Médial) :</text>
    <text x="70" y="680" font-size="10" fill="#34495e">Attaché condyle fémoral médial → tibia médial | Ligament extra-capsulaire</text>
    <text x="70" y="697" font-size="10" fill="#34495e">Fonction : Stabilité médiale en extension, prévient valgus | Souvent déchiré avec rupture LCA</text>
    
    <!-- Row 4 -->
    <text x="70" y="730" font-size="11" font-weight="bold" fill="#e74c3c">LCL (Ligament Collatéral Latéral) :</text>
    <text x="70" y="750" font-size="10" fill="#34495e">Attaché condyle fémoral latéral → fibula | Séparé capsule (ex-capsulaire)</text>
    <text x="70" y="767" font-size="10" fill="#34495e">Fonction : Stabilité latérale en extension, prévient varus | Lésions moins fréquentes</text>
  </g>

  <!-- Points clés -->
  <rect x="50" y="785" width="1100" height="15" fill="#27ae60" opacity="0.1"/>
</svg>
