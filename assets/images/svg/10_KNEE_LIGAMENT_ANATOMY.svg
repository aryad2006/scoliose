<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <!-- Title -->
  <text x="500" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Anatomie Ligamentaire du Genou — Vue Antérieure &amp; Sagittale
  </text>

  <!-- === ANTERIOR VIEW === -->
  <g id="anterior-view">
    <text x="250" y="80" font-size="16" font-weight="bold" text-anchor="middle" fill="#003366" text-decoration="underline">
      Vue Antérieure
    </text>

    <!-- Femur -->
    <ellipse cx="250" cy="150" rx="35" ry="50" fill="#e8d4c4" stroke="#333" stroke-width="2"/>
    <text x="250" y="155" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">Fémur</text>

    <!-- Tibia -->
    <polygon points="220,200 280,200 275,380 225,380" fill="#f5e6d3" stroke="#333" stroke-width="2"/>
    <text x="250" y="300" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">Tibia</text>

    <!-- Patella -->
    <ellipse cx="250" cy="130" rx="20" ry="25" fill="#ffe8cc" stroke="#333" stroke-width="2"/>
    <text x="250" y="135" font-size="8" fill="#333" text-anchor="middle">Rotule</text>

    <!-- LCA (Anterior Cruciate Ligament) -->
    <line x1="240" y1="175" x2="235" y2="250" stroke="#cc0000" stroke-width="4" stroke-linecap="round"/>
    <text x="215" y="210" font-size="10" fill="#cc0000" font-weight="bold">LCA</text>
    <text x="215" y="225" font-size="9" fill="#cc0000">(cruciforme ant.)</text>

    <!-- LCP (Posterior Cruciate Ligament) -->
    <line x1="260" y1="175" x2="265" y2="250" stroke="#0066cc" stroke-width="4" stroke-linecap="round"/>
    <text x="280" y="210" font-size="10" fill="#0066cc" font-weight="bold">LCP</text>
    <text x="280" y="225" font-size="9" fill="#0066cc">(cruciforme post.)</text>

    <!-- MCL (Medial Collateral Ligament) -->
    <line x1="220" y1="160" x2="190" y2="320" stroke="#ff9900" stroke-width="3" stroke-linecap="round"/>
    <text x="160" y="240" font-size="10" fill="#ff9900" font-weight="bold">LLI</text>
    <text x="160" y="255" font-size="9" fill="#ff9900">(collatéral interne)</text>

    <!-- LCL (Lateral Collateral Ligament) -->
    <line x1="280" y1="160" x2="310" y2="320" stroke="#009900" stroke-width="3" stroke-linecap="round"/>
    <text x="330" y="240" font-size="10" fill="#009900" font-weight="bold">LLE</text>
    <text x="330" y="255" font-size="9" fill="#009900">(collatéral externe)</text>

    <!-- Patellar ligament -->
    <line x1="250" y1="155" x2="250" y2="200" stroke="#ff99cc" stroke-width="2" stroke-linecap="round"/>
    <text x="270" y="180" font-size="9" fill="#ff99cc" font-weight="bold">Lig. patellaire</text>

    <!-- Menisci outline -->
    <path d="M 235 205 Q 220 235 225 265 Q 240 275 250 272" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="215" y="245" font-size="8" fill="#999">Ménisque</text>
    <text x="215" y="257" font-size="8" fill="#999">médial</text>

    <path d="M 265 205 Q 280 235 275 265 Q 260 275 250 272" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="280" y="245" font-size="8" fill="#999">Ménisque</text>
    <text x="280" y="257" font-size="8" fill="#999">latéral</text>
  </g>

  <!-- === SAGITTAL VIEW (PROFILE) === -->
  <g id="sagittal-view">
    <text x="750" y="80" font-size="16" font-weight="bold" text-anchor="middle" fill="#003366" text-decoration="underline">
      Vue Sagittale (profil)
    </text>

    <!-- Femur -->
    <polygon points="700,150 750,130 800,150 750,200" fill="#e8d4c4" stroke="#333" stroke-width="2"/>
    <text x="750" y="170" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">Fémur</text>

    <!-- Tibia -->
    <polygon points="700,200 800,200 795,380 705,360" fill="#f5e6d3" stroke="#333" stroke-width="2"/>
    <text x="750" y="300" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">Tibia</text>

    <!-- Patella -->
    <ellipse cx="720" cy="170" rx="18" ry="30" fill="#ffe8cc" stroke="#333" stroke-width="2"/>
    <text x="720" y="175" font-size="8" fill="#333" text-anchor="middle">Rotule</text>

    <!-- LCA attachment path -->
    <line x1="735" y1="155" x2="715" y2="245" stroke="#cc0000" stroke-width="4" stroke-linecap="round"/>
    <text x="710" y="195" font-size="10" fill="#cc0000" font-weight="bold">LCA</text>
    <circle cx="735" cy="155" r="3" fill="#cc0000"/>
    <text x="750" y="155" font-size="8" fill="#cc0000">inséré fémoral</text>
    <circle cx="715" cy="245" r="3" fill="#cc0000"/>
    <text x="730" y="245" font-size="8" fill="#cc0000">inséré tibial</text>

    <!-- LCP attachment path -->
    <line x1="765" y1="155" x2="785" y2="280" stroke="#0066cc" stroke-width="4" stroke-linecap="round"/>
    <text x="785" y="195" font-size="10" fill="#0066cc" font-weight="bold">LCP</text>
    <circle cx="765" cy="155" r="3" fill="#0066cc"/>
    <circle cx="785" cy="280" r="3" fill="#0066cc"/>

    <!-- Patellar ligament -->
    <line x1="720" y1="200" x2="735" y2="240" stroke="#ff99cc" stroke-width="2" stroke-linecap="round"/>
    <text x="745" y="220" font-size="8" fill="#ff99cc" font-weight="bold">Ligament</text>
    <text x="745" y="232" font-size="8" fill="#ff99cc" font-weight="bold">patellaire</text>

    <!-- Posterior capsule -->
    <path d="M 770 240 Q 800 300 790 350" fill="none" stroke="#996633" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="805" y="290" font-size="9" fill="#996633">Capsule</text>
    <text x="805" y="303" font-size="9" fill="#996633">postérieure</text>

    <!-- Popliteus muscle indicator -->
    <ellipse cx="750" cy="320" rx="30" ry="20" fill="none" stroke="#cc99cc" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="750" y="325" font-size="8" fill="#cc99cc" text-anchor="middle">Poplité</text>
  </g>

  <!-- === DETAILED ANATOMY BOX === -->
  <rect x="50" y="420" width="900" height="270" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="8"/>

  <text x="70" y="445" font-size="13" font-weight="bold" fill="#003366">RÔLES STABILISATEURS PAR LIGAMENT :</text>

  <!-- LCA details -->
  <rect x="70" y="460" width="220" height="100" fill="#ffe6e6" stroke="#cc0000" stroke-width="2" rx="5"/>
  <text x="85" y="480" font-size="11" font-weight="bold" fill="#660000">LCA (Cruciforme Ant.)</text>
  <text x="85" y="498" font-size="9" fill="#660000">• Prévient translation antéro-tibiale</text>
  <text x="85" y="513" font-size="9" fill="#660000">• Contrôle rotation interne</text>
  <text x="85" y="528" font-size="9" fill="#660000">• Stabilise en extension/flexion</text>
  <text x="85" y="543" font-size="9" fill="#660000">• Force rupture : 1700-2100 N</text>

  <!-- LCP details -->
  <rect x="300" y="460" width="220" height="100" fill="#e6f2ff" stroke="#0066cc" stroke-width="2" rx="5"/>
  <text x="315" y="480" font-size="11" font-weight="bold" fill="#003366">LCP (Cruciforme Post.)</text>
  <text x="315" y="498" font-size="9" fill="#003366">• Prévient translation postérieure</text>
  <text x="315" y="513" font-size="9" fill="#003366">• Primaire stabilisateur postérieur</text>
  <text x="315" y="528" font-size="9" fill="#003366">• Rôle moins critique que LCA</text>
  <text x="315" y="543" font-size="9" fill="#003366">• Force rupture : 2600-3400 N</text>

  <!-- Collateral details -->
  <rect x="530" y="460" width="220" height="100" fill="#e6ffe6" stroke="#009900" stroke-width="2" rx="5"/>
  <text x="545" y="480" font-size="11" font-weight="bold" fill="#003300">Stabilisateurs Latéraux</text>
  <text x="545" y="498" font-size="9" fill="#003300">• LLI : stabilité médiale varus/valgus</text>
  <text x="545" y="513" font-size="9" fill="#003300">• LLE : stabilité latérale + rotation</text>
  <text x="545" y="528" font-size="9" fill="#003300">• Entorse commune (50% des blessures)</text>
  <text x="545" y="543" font-size="9" fill="#003300">• Souvent sutures vs réparation LCA</text>

  <!-- Menisci details -->
  <rect x="760" y="460" width="190" height="100" fill="#fff9e6" stroke="#ff9900" stroke-width="2" rx="5"/>
  <text x="775" y="480" font-size="11" font-weight="bold" fill="#663300">Ménisques (stabilisateurs 2°)</text>
  <text x="775" y="498" font-size="9" fill="#663300">• Absorption choc (50-70%)</text>
  <text x="775" y="513" font-size="9" fill="#663300">• Lubrification (synovie)</text>
  <text x="775" y="528" font-size="9" fill="#663300">• Stabilité accessoire LCA</text>
  <text x="775" y="543" font-size="9" fill="#663300">• Déchirures : 25-30% LCA</text>

  <!-- Function summary -->
  <rect x="70" y="570" width="880" height="110" fill="#fffacd" stroke="#ff9900" stroke-width="2" rx="5"/>
  <text x="90" y="595" font-size="11" font-weight="bold" fill="#663300">FONCTION INTÉGRÉE — STABILITÉ GENOU :</text>

  <text x="90" y="615" font-size="9" fill="#333">
    <tspan font-weight="bold">Stabilité statique</tspan> : Ligaments (LCA/LCP/collatéraux) + capsule + ménisques = structure passive maintient alignement os
  </text>

  <text x="90" y="633" font-size="9" fill="#333">
    <tspan font-weight="bold">Stabilité dynamique</tspan> : Muscles (quadriceps, ischio-jambiers, mollet) = contrôle proprioceptif, amortissement, réaction rapide
  </text>

  <text x="90" y="651" font-size="9" fill="#333">
    <tspan font-weight="bold">PTS élevée (≥12°)</tspan> → augmente sollicitation LCA (shift antérieur force) → risque rupture ↑ → reconstruction requise si instabilité symptomatique
  </text>

  <text x="90" y="669" font-size="9" fill="#333">
    <tspan font-weight="bold">Chirurgie genou</tspan> : Must respect ligamentaire architecture — réparation LCA, préservation ménisques, respect neurovaisculaire, réalignement PTS/axe
  </text>
</svg>