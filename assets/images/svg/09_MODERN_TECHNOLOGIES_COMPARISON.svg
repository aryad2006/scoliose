<svg width="1100" height="700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700">
  <!-- Title -->
  <text x="550" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Technologies Modernes PTG — Navigation vs pSI vs Robotique
  </text>

  <!-- === TECHNOLOGY 1: COMPUTER NAVIGATION === -->
  <g id="navigation-tech">
    <rect x="50" y="80" width="300" height="580" fill="#e8f4f8" stroke="#0066cc" stroke-width="2" rx="8"/>

    <text x="200" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#003366">
      Navigation Informatisée
    </text>

    <!-- Tech diagram -->
    <rect x="80" y="140" width="240" height="140" fill="#ffffff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="200" y="165" font-size="10" font-weight="bold" text-anchor="middle" fill="#003366">Système optique intra-op</text>

    <circle cx="120" cy="210" r="5" fill="#0066cc"/>
    <text x="120" y="235" font-size="9" text-anchor="middle" fill="#333">Caméra IR</text>

    <circle cx="200" cy="210" r="5" fill="#0066cc"/>
    <text x="200" y="235" font-size="9" text-anchor="middle" fill="#333">Marqueurs</text>
    <text x="200" y="247" font-size="9" text-anchor="middle" fill="#333">réflectifs</text>

    <circle cx="280" cy="210" r="5" fill="#0066cc"/>
    <text x="280" y="235" font-size="9" text-anchor="middle" fill="#333">Console</text>
    <text x="280" y="247" font-size="9" text-anchor="middle" fill="#333">temps réel</text>

    <!-- Process flow -->
    <rect x="80" y="310" width="240" height="150" fill="#f0f8ff" stroke="#0066cc" stroke-width="1" rx="3"/>
    <text x="90" y="330" font-size="9" font-weight="bold" fill="#003366">Workflow :</text>
    <text x="90" y="348" font-size="8" fill="#003366">1. Prise de repères anatomiques (landmark)</text>
    <text x="90" y="363" font-size="8" fill="#003366">2. Construction modèle 3D patient</text>
    <text x="90" y="378" font-size="8" fill="#003366">3. Planification alignement (MA/rKA)</text>
    <text x="90" y="393" font-size="8" fill="#003366">4. Guidage intra-op (cutting guides)</text>
    <text x="90" y="408" font-size="8" fill="#003366">5. Vérification alignement post-cut</text>
    <text x="90" y="423" font-size="8" fill="#003366">6. Trial reduction + ajustements</text>
    <text x="90" y="438" font-size="8" fill="#003366">7. Implantation cimentée/press-fit</text>

    <!-- Pros/Cons -->
    <text x="90" y="475" font-size="9" font-weight="bold" fill="#003366">✓ Avantages :</text>
    <text x="90" y="490" font-size="8" fill="#003366">• Alignement très précis (±1°)</text>
    <text x="90" y="503" font-size="8" fill="#003366">• Guidage intra-op temps réel</text>
    <text x="90" y="516" font-size="8" fill="#003366">• Travaille avec os intact</text>
    <text x="90" y="529" font-size="8" fill="#003366">• Apprentissage moderne standard</text>

    <text x="90" y="552" font-size="9" font-weight="bold" fill="#660000">✗ Inconvénients :</text>
    <text x="90" y="567" font-size="8" fill="#660000">• Temps opératoire +10-15 min</text>
    <text x="90" y="580" font-size="8" fill="#660000">• Coût équipement 500K€+</text>
    <text x="90" y="593" font-size="8" fill="#660000">• Courbe apprentissage modérée</text>
    <text x="90" y="606" font-size="8" fill="#660000">• Perte suivi si repères perdus</text>
  </g>

  <!-- === TECHNOLOGY 2: PATIENT-SPECIFIC INSTRUMENTS (pSI) === -->
  <g id="psi-tech">
    <rect x="400" y="80" width="300" height="580" fill="#f0fff0" stroke="#009900" stroke-width="2" rx="8"/>

    <text x="550" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#003300">
      pSI (Patient-Specific)
    </text>

    <!-- Tech diagram -->
    <rect x="430" y="140" width="240" height="140" fill="#ffffff" stroke="#009900" stroke-width="2" rx="5"/>
    <text x="550" y="165" font-size="10" font-weight="bold" text-anchor="middle" fill="#003333">Guides adaptés patient 3D</text>

    <polygon points="480,210 500,180 520,210 500,240" fill="#009900"/>
    <text x="500" y="235" font-size="9" text-anchor="middle" fill="#333">IRM/TDM</text>

    <line x1="530" y1="210" x2="570" y2="210" stroke="#009900" stroke-width="2"/>

    <rect x="580" y="195" width="60" height="30" fill="#009900" stroke="#003300" stroke-width="1" rx="2"/>
    <text x="610" y="215" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">Guides pSI</text>

    <!-- Process flow -->
    <rect x="430" y="310" width="240" height="150" fill="#f0fff0" stroke="#009900" stroke-width="1" rx="3"/>
    <text x="440" y="330" font-size="9" font-weight="bold" fill="#003300">Workflow :</text>
    <text x="440" y="348" font-size="8" fill="#003300">1. IRM/TDM 3D du patient</text>
    <text x="440" y="363" font-size="8" fill="#003300">2. Planification alignement détaillée</text>
    <text x="440" y="378" font-size="8" fill="#003300">3. CAO des guides custom</text>
    <text x="440" y="393" font-size="8" fill="#003300">4. Impression/fabrication guides</text>
    <text x="440" y="408" font-size="8" fill="#003300">5. Livraison guides stériles</text>
    <text x="440" y="423" font-size="8" fill="#003300">6. Utilisation intra-op (clipping os)</text>
    <text x="440" y="438" font-size="8" fill="#003300">7. Cutting guidé par pSI</text>

    <!-- Pros/Cons -->
    <text x="440" y="475" font-size="9" font-weight="bold" fill="#003300">✓ Avantages :</text>
    <text x="440" y="490" font-size="8" fill="#003300">• Très haute précision (±0.5°)</text>
    <text x="440" y="503" font-size="8" fill="#003300">• Pas besoin équipement intra-op</text>
    <text x="440" y="516" font-size="8" fill="#003300">• Temps opératoire normal</text>
    <text x="440" y="529" font-size="8" fill="#003300">• Reproductibilité excellente</text>

    <text x="440" y="552" font-size="9" font-weight="bold" fill="#660000">✗ Inconvénients :</text>
    <text x="440" y="567" font-size="8" fill="#660000">• Coût par patient 1000-1500€</text>
    <text x="440" y="580" font-size="8" fill="#660000">• Délai 2-3 semaines fabrication</text>
    <text x="440" y="593" font-size="8" fill="#660000">• Pas d'ajustement intra-op facile</text>
    <text x="440" y="606" font-size="8" fill="#660000">• Dépend qualité IRM (artefacts)</text>
  </g>

  <!-- === TECHNOLOGY 3: ROBOTIC ASSISTANCE === -->
  <g id="robotic-tech">
    <rect x="750" y="80" width="300" height="580" fill="#fff5f0" stroke="#ff6600" stroke-width="2" rx="8"/>

    <text x="900" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#993300">
      Assistance Robotique
    </text>

    <!-- Tech diagram -->
    <rect x="780" y="140" width="240" height="140" fill="#ffffff" stroke="#ff6600" stroke-width="2" rx="5"/>
    <text x="900" y="165" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Bras mécanique guidé + haptic feedback</text>

    <polygon points="830,210 850,180 870,210 850,240" fill="#ff6600"/>
    <text x="850" y="235" font-size="9" text-anchor="middle" fill="#333">Patient anatomy</text>

    <rect x="900" y="195" width="60" height="30" fill="#ff6600" stroke="#cc3300" stroke-width="1" rx="2"/>
    <text x="930" y="215" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">Robot</text>

    <line x1="880" y1="210" x2="900" y2="210" stroke="#ff6600" stroke-width="2"/>

    <!-- Process flow -->
    <rect x="780" y="310" width="240" height="150" fill="#fff5f0" stroke="#ff6600" stroke-width="1" rx="3"/>
    <text x="790" y="330" font-size="9" font-weight="bold" fill="#993300">Workflow :</text>
    <text x="790" y="348" font-size="8" fill="#993300">1. IRM/TDM 3D planning</text>
    <text x="790" y="363" font-size="8" fill="#993300">2. Calibration robot intra-op</text>
    <text x="790" y="378" font-size="8" fill="#993300">3. Tracking optique patient</text>
    <text x="790" y="393" font-size="8" fill="#993300">4. Robot guidage cutting (haptic)</text>
    <text x="790" y="408" font-size="8" fill="#993300">5. Bras exerce force prévisible</text>
    <text x="790" y="423" font-size="8" fill="#993300">6. Surgeon reste en contrôle</text>
    <text x="790" y="438" font-size="8" fill="#993300">7. Vérification navigation post-cut</text>

    <!-- Pros/Cons -->
    <text x="790" y="475" font-size="9" font-weight="bold" fill="#003300">✓ Avantages :</text>
    <text x="790" y="490" font-size="8" fill="#003300">• Très haute précision (±0.3°)</text>
    <text x="790" y="503" font-size="8" fill="#003300">• Guidage continu intra-op</text>
    <text x="790" y="516" font-size="8" fill="#003300">• Haptic feedback force control</text>
    <text x="790" y="529" font-size="8" fill="#003300">• Recherche outcomes prometteurs</text>

    <text x="790" y="552" font-size="9" font-weight="bold" fill="#660000">✗ Inconvénients :</text>
    <text x="790" y="567" font-size="8" fill="#660000">• Coût équipement très élevé</text>
    <text x="790" y="580" font-size="8" fill="#660000">• Temps opératoire +20-30 min</text>
    <text x="790" y="593" font-size="8" fill="#660000">• Apprentissage dédié requis</text>
    <text x="790" y="606" font-size="8" fill="#660000">• Données long-term limitées</text>
  </g>

  <!-- === SUMMARY COMPARISON === -->
  <rect x="50" y="680" width="1000" height="15" fill="#ffffcc" stroke="#ff9900" stroke-width="1" rx="3"/>
  <text x="70" y="693" font-size="9" fill="#663300">
    <tspan font-weight="bold">Standard actuel :</tspan> Navigation ou pSI = approches modernes acceptées | Robotique = encore en phase d'évaluation (outcomes data 5+ ans nécessaire)
  </text>
</svg>