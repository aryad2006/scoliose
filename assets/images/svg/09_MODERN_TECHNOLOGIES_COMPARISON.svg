<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 850">
  <text x="700" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Technologies Modernes PTG : Navigation vs pSI vs Robotique
  </text>

  <!-- Navigation Column -->
  <g>
    <rect x="50" y="80" width="400" height="750" fill="#f0f3f4" stroke="#34495e" stroke-width="2" rx="8"/>
    <text x="250" y="115" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Navigation Intra-op</text>
    <circle cx="250" cy="190" r="45" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <text x="250" y="200" font-size="20" text-anchor="middle" fill="#3498db">📡</text>
    <text x="250" y="270" font-size="10" text-anchor="middle" fill="#34495e">Système tracking temps réel</text>
    <text x="70" y="310" font-size="11" font-weight="bold" fill="#27ae60">Avantages :</text>
    <text x="70" y="330" font-size="10" fill="#555">• Alignement précis real-time</text>
    <text x="70" y="348" font-size="10" fill="#555">• Feedback immédiat</text>
    <text x="70" y="366" font-size="10" fill="#555">• Reproduit bien</text>
    <text x="70" y="384" font-size="10" fill="#555">• Courbe apprentissage OK</text>
    <text x="70" y="410" font-size="11" font-weight="bold" fill="#e74c3c">Inconvénients :</text>
    <text x="70" y="430" font-size="10" fill="#555">• Équipement coûteux</text>
    <text x="70" y="448" font-size="10" fill="#555">• Temps opératoire +15-20m</text>
    <text x="70" y="466" font-size="10" fill="#555">• Courbe apprentissage</text>
    <text x="70" y="484" font-size="10" fill="#555">• Maintenance coûteuse</text>
    <text x="70" y="515" font-size="10" fill="#34495e" font-weight="bold">Précision alignement :</text>
    <text x="70" y="535" font-size="10" fill="#555">✓ ±1-2° (très bon)</text>
    <text x="70" y="555" font-size="10" fill="#555">✓ Survie prothèse 95%+</text>
    <rect x="70" y="585" width="330" height="40" fill="#e8f4f8" stroke="#3498db" stroke-width="1" rx="3"/>
    <text x="235" y="608" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c3e50">Coût équipement : 400-600k EUR</text>
  </g>

  <!-- pSI Column (PROMETTEUR) -->
  <g>
    <rect x="500" y="80" width="400" height="750" fill="#e8f8f5" stroke="#27ae60" stroke-width="3" rx="8"/>
    <text x="700" y="115" font-size="14" font-weight="bold" text-anchor="middle" fill="#229954">Patient-Specific Instruments (pSI) 🚀</text>
    <circle cx="700" cy="190" r="45" fill="#e8f4f8" stroke="#27ae60" stroke-width="2"/>
    <text x="700" y="200" font-size="20" text-anchor="middle" fill="#27ae60">🔧</text>
    <text x="700" y="270" font-size="10" text-anchor="middle" fill="#34495e">Guides personnalisés IRM/CT</text>
    <text x="520" y="310" font-size="11" font-weight="bold" fill="#27ae60">Avantages :</text>
    <text x="520" y="330" font-size="10" fill="#555">• Sans technologie intra-op</text>
    <text x="520" y="348" font-size="10" fill="#555">• Temps opératoire réduit</text>
    <text x="520" y="366" font-size="10" fill="#555">• Guides personnalisés exact</text>
    <text x="520" y="384" font-size="10" fill="#555">• Pas besoin équipement</text>
    <text x="520" y="410" font-size="11" font-weight="bold" fill="#e74c3c">Inconvénients :</text>
    <text x="520" y="430" font-size="10" fill="#555">• Fabrication délai 2-3w</text>
    <text x="520" y="448" font-size="10" fill="#555">• Surcoût par patient</text>
    <text x="520" y="466" font-size="10" fill="#555">• Guides perdus/endommagés</text>
    <text x="520" y="484" font-size="10" fill="#555">• Dépendant IRM/CT qualité</text>
    <text x="520" y="515" font-size="10" fill="#34495e" font-weight="bold">Précision alignement :</text>
    <text x="520" y="535" font-size="10" fill="#555">✓ ±1-1.5° (excellent)</text>
    <text x="520" y="555" font-size="10" fill="#555">✓ Survie 96%+ (données courtes)</text>
    <rect x="520" y="585" width="330" height="40" fill="#e8f8f5" stroke="#27ae60" stroke-width="2" rx="3"/>
    <text x="685" y="608" font-size="11" font-weight="bold" text-anchor="middle" fill="#229954">Coût + 1500-2500 EUR/patient</text>
  </g>

  <!-- Robotique Column -->
  <g>
    <rect x="950" y="80" width="400" height="750" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="8"/>
    <text x="1150" y="115" font-size="14" font-weight="bold" text-anchor="middle" fill="#d68910">Robotique Assistée</text>
    <circle cx="1150" cy="190" r="45" fill="#fff3cd" stroke="#f39c12" stroke-width="2"/>
    <text x="1150" y="200" font-size="20" text-anchor="middle" fill="#f39c12">🤖</text>
    <text x="1150" y="270" font-size="10" text-anchor="middle" fill="#34495e">Bras robot haptic guidance</text>
    <text x="970" y="310" font-size="11" font-weight="bold" fill="#27ae60">Avantages :</text>
    <text x="970" y="330" font-size="10" fill="#555">• Précision maximale</text>
    <text x="970" y="348" font-size="10" fill="#555">• Haptic feedback vibrant</text>
    <text x="970" y="366" font-size="10" fill="#555">• Facteur apprentissage ++</text>
    <text x="970" y="384" font-size="10" fill="#555">• Données outcomes excellent</text>
    <text x="970" y="410" font-size="11" font-weight="bold" fill="#e74c3c">Inconvénients :</text>
    <text x="970" y="430" font-size="10" fill="#555">• Coût très élevé (1-2M EUR)</text>
    <text x="970" y="448" font-size="10" fill="#555">• Temps opératoire long</text>
    <text x="970" y="466" font-size="10" fill="#555">• Maintenance très coûteuse</text>
    <text x="970" y="484" font-size="10" fill="#555">• Seulement centres referral</text>
    <text x="970" y="515" font-size="10" fill="#34495e" font-weight="bold">Précision alignement :</text>
    <text x="970" y="535" font-size="10" fill="#555">✓ ±0.5-1° (optimal)</text>
    <text x="970" y="555" font-size="10" fill="#555">✓ Survie 97%+ (court suivi)</text>
    <rect x="970" y="585" width="330" height="40" fill="#fff9e6" stroke="#f39c12" stroke-width="1" rx="3"/>
    <text x="1135" y="608" font-size="11" font-weight="bold" text-anchor="middle" fill="#d68910">Coût équipement : 1-2M EUR</text>
  </g>

  <!-- Comparison table -->
  <rect x="50" y="840" width="1300" height="10" fill="#95a5a6"/>
</svg>
