<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <!-- Title -->
  <text x="500" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Philosophies d'Alignement PTG — Mécanique vs Anatomique vs Cinématique
  </text>

  <!-- === MECHANICAL ALIGNMENT (MA) === -->
  <g id="ma-alignment">
    <text x="180" y="80" font-size="15" font-weight="bold" text-anchor="middle" fill="#003366" text-decoration="underline">
      Alignement Mécanique (MA)
    </text>

    <!-- Femur -->
    <line x1="180" y1="120" x2="180" y2="180" stroke="#0066cc" stroke-width="6" stroke-linecap="round"/>
    <circle cx="180" cy="190" r="12" fill="#0066cc"/>

    <!-- Tibia -->
    <line x1="180" y1="190" x2="180" y2="300" stroke="#ff9900" stroke-width="6" stroke-linecap="round"/>
    <circle cx="180" cy="310" r="10" fill="#ff9900"/>

    <!-- Mechanical axis line (vertical) -->
    <line x1="180" y1="100" x2="180" y2="330" stroke="#0066cc" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="195" y="210" font-size="11" fill="#0066cc" font-weight="bold">Axe mécanique</text>

    <!-- Alignment markers -->
    <rect x="150" y="180" width="60" height="25" fill="#f0f8ff" stroke="#0066cc" stroke-width="1" rx="3"/>
    <text x="180" y="198" font-size="10" font-weight="bold" text-anchor="middle" fill="#003366">
      0° ± 3°
    </text>

    <!-- Description -->
    <rect x="100" y="340" width="160" height="140" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="110" y="360" font-size="11" font-weight="bold" fill="#003366">Alignement Mécanique</text>
    <text x="110" y="380" font-size="9" fill="#003366">• Gold standard depuis</text>
    <text x="110" y="395" font-size="9" fill="#003366">  30 ans (Insall, Whiteside)</text>
    <text x="110" y="410" font-size="9" fill="#003366">• Axe mécanique neutre</text>
    <text x="110" y="425" font-size="9" fill="#003366">• Survie prothèse :</text>
    <text x="110" y="440" font-size="9" fill="#003366" font-weight="bold">  92-96% à 20 ans</text>
    <text x="110" y="455" font-size="9" fill="#003366">• Utilité : patient moyen</text>
    <text x="110" y="470" font-size="9" fill="#003366">  sans axes extremes</text>
  </g>

  <!-- === KINEMATIC ALIGNMENT (KA) === -->
  <g id="ka-alignment">
    <text x="500" y="80" font-size="15" font-weight="bold" text-anchor="middle" fill="#cc0000" text-decoration="underline">
      Alignement Cinématique (KA)
    </text>

    <!-- Femur (valgus rotated) -->
    <line x1="490" y1="130" x2="510" y2="180" stroke="#0066cc" stroke-width="6" stroke-linecap="round"/>
    <circle cx="512" cy="190" r="12" fill="#0066cc"/>

    <!-- Tibia (varus) -->
    <line x1="512" y1="190" x2="485" y2="300" stroke="#ff9900" stroke-width="6" stroke-linecap="round"/>
    <circle cx="475" cy="310" r="10" fill="#ff9900"/>

    <!-- Kinematic axis (flexion line) -->
    <path d="M 510 160 L 490 300" stroke="#cc0000" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="450" y="210" font-size="11" fill="#cc0000" font-weight="bold">Axe cinématique</text>

    <!-- Angle annotation -->
    <path d="M 500 150 Q 510 170 515 185" fill="none" stroke="#cc0000" stroke-width="2"/>
    <text x="525" y="170" font-size="10" font-weight="bold" fill="#cc0000">Flexion-valgus</text>

    <!-- Description -->
    <rect x="420" y="340" width="160" height="140" fill="#ffe6e6" stroke="#cc0000" stroke-width="2" rx="5"/>
    <text x="430" y="360" font-size="11" font-weight="bold" fill="#660000">Alignement Cinématique</text>
    <text x="430" y="380" font-size="9" fill="#660000">• Respecte axes naturels</text>
    <text x="430" y="395" font-size="9" fill="#660000">  du genou (Rivière 2020)</text>
    <text x="430" y="410" font-size="9" fill="#660000">• Flexion fémorale +5°</text>
    <text x="430" y="425" font-size="9" fill="#660000">• Valgus fémoral +3°</text>
    <text x="430" y="440" font-size="9" fill="#660000" font-weight="bold">• Survie 95%+ précoce</text>
    <text x="430" y="455" font-size="9" fill="#660000">• Meilleure cinématique</text>
    <text x="430" y="470" font-size="9" fill="#660000">  genoux "naturels"</text>
  </g>

  <!-- === RESTRICTED KINEMATIC (rKA) === -->
  <g id="rka-alignment">
    <text x="820" y="80" font-size="15" font-weight="bold" text-anchor="middle" fill="#009900" text-decoration="underline">
      Cinématique Restreint (rKA)
    </text>

    <!-- Femur (slight valgus) -->
    <line x1="810" y1="125" x2="828" y2="178" stroke="#0066cc" stroke-width="6" stroke-linecap="round"/>
    <circle cx="830" cy="190" r="12" fill="#0066cc"/>

    <!-- Tibia (slight varus) -->
    <line x1="830" y1="190" x2="810" y2="300" stroke="#ff9900" stroke-width="6" stroke-linecap="round"/>
    <circle cx="800" cy="310" r="10" fill="#ff9900"/>

    <!-- rKA axis (compromise) -->
    <line x1="820" y1="100" x2="815" y2="330" stroke="#009900" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="750" y="210" font-size="11" fill="#009900" font-weight="bold">Axe rKA (compromis)</text>

    <!-- Angle annotation -->
    <path d="M 820 140 Q 825 160 828 180" fill="none" stroke="#009900" stroke-width="2"/>
    <text x="840" y="160" font-size="10" font-weight="bold" fill="#009900">Flexion +2-3°</text>

    <!-- Description -->
    <rect x="740" y="340" width="160" height="140" fill="#e6ffe6" stroke="#009900" stroke-width="2" rx="5"/>
    <text x="750" y="360" font-size="11" font-weight="bold" fill="#003300">Cinématique Restreint</text>
    <text x="750" y="380" font-size="9" fill="#003300">• Compromis pragmatique</text>
    <text x="750" y="395" font-size="9" fill="#003300">  (Rivière 2020, standard EU)</text>
    <text x="750" y="410" font-size="9" fill="#003300">• Flexion fémorale +1-2°</text>
    <text x="750" y="425" font-size="9" fill="#003300">• Légère correction axe</text>
    <text x="750" y="440" font-size="9" fill="#003300" font-weight="bold">• Survie 92-96% (MA level)</text>
    <text x="750" y="455" font-size="9" fill="#003300">• Guide pSI/robotique</text>
    <text x="750" y="470" font-size="9" fill="#003300">  moderne standard</text>
  </g>

  <!-- === COMPARISON TABLE === -->
  <g id="comparison">
    <rect x="50" y="510" width="900" height="170" fill="#f9f9f9" stroke="#333" stroke-width="2" rx="8"/>

    <text x="70" y="535" font-size="13" font-weight="bold" fill="#1a1a1a">COMPARAISON ALIGNEMENTS :</text>

    <!-- Table headers -->
    <line x1="70" y1="550" x2="950" y2="550" stroke="#333" stroke-width="1"/>

    <text x="85" y="565" font-size="11" font-weight="bold" fill="#333">Critère</text>
    <text x="235" y="565" font-size="11" font-weight="bold" fill="#333">Alignement Mécanique (MA)</text>
    <text x="525" y="565" font-size="11" font-weight="bold" fill="#333">Cinématique (KA)</text>
    <text x="800" y="565" font-size="11" font-weight="bold" fill="#333">Restreint (rKA)</text>

    <!-- Row 1 -->
    <line x1="70" y1="575" x2="950" y2="575" stroke="#ddd" stroke-width="1"/>
    <text x="85" y="590" font-size="10" fill="#333" font-weight="bold">Historique</text>
    <text x="235" y="590" font-size="10" fill="#333">30 ans, référence</text>
    <text x="525" y="590" font-size="10" fill="#333">2020+ (Rivière, rKA standard)</text>
    <text x="800" y="590" font-size="10" fill="#333">Actuel (pragmatique)</text>

    <!-- Row 2 -->
    <line x1="70" y1="600" x2="950" y2="600" stroke="#ddd" stroke-width="1"/>
    <text x="85" y="615" font-size="10" fill="#333" font-weight="bold">Survie 20 ans</text>
    <text x="235" y="615" font-size="10" fill="#333">92-96%</text>
    <text x="525" y="615" font-size="10" fill="#333">95%+ (early promising)</text>
    <text x="800" y="615" font-size="10" fill="#333">92-96% (MA-level)</text>

    <!-- Row 3 -->
    <line x1="70" y1="625" x2="950" y2="625" stroke="#ddd" stroke-width="1"/>
    <text x="85" y="640" font-size="10" fill="#333" font-weight="bold">Patient idéal</text>
    <text x="235" y="640" font-size="10" fill="#333">Axes moyens</text>
    <text x="525" y="640" font-size="10" fill="#333">Axes extremes (raro/varo)</text>
    <text x="800" y="640" font-size="10" fill="#333">Plupart patients</text>

    <!-- Row 4 -->
    <line x1="70" y1="650" x2="950" y2="650" stroke="#ddd" stroke-width="1"/>
    <text x="85" y="665" font-size="10" fill="#333" font-weight="bold">Tech. guidage</text>
    <text x="235" y="665" font-size="10" fill="#333">Navigation, pSI</text>
    <text x="525" y="665" font-size="10" fill="#333">pSI patient-specific</text>
    <text x="800" y="665" font-size="10" fill="#333">pSI, robotique standard</text>

    <line x1="70" y1="675" x2="950" y2="675" stroke="#333" stroke-width="1"/>
  </g>
</svg>