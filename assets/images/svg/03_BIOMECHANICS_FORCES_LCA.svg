<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <!-- Title -->
  <text x="450" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Biomécaniques des Forces — Impact PTS sur Tension LCA
  </text>

  <!-- === SCENARIO 1: NORMAL PTS (7°) === -->
  <g id="normal-pts">
    <text x="225" y="80" font-size="16" font-weight="bold" text-anchor="middle" fill="#0066cc">
      Normal : PTS = 7° ± 3°
    </text>

    <!-- Tibia profile -->
    <line x1="120" y1="150" x2="320" y2="180" stroke="#999" stroke-width="3"/>
    <line x1="120" y1="150" x2="330" y2="150" stroke="#0066cc" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- Femur -->
    <ellipse cx="200" cy="100" rx="25" ry="40" fill="#e8d4c4" stroke="#333" stroke-width="2"/>

    <!-- LCA -->
    <line x1="190" y1="140" x2="160" y2="175" stroke="#cc0000" stroke-width="4" stroke-linecap="round"/>
    <text x="165" y="135" font-size="12" fill="#cc0000" font-weight="bold">LCA</text>

    <!-- Force vectors -->
    <!-- Gravitational + muscular force -->
    <g id="force-gravity">
      <defs>
        <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <polygon points="0 0, 10 3, 0 6" fill="#0066cc"/>
        </marker>
      </defs>
      <line x1="200" y1="80" x2="200" y2="160" stroke="#0066cc" stroke-width="3" marker-end="url(#arrowhead-blue)"/>
      <text x="210" y="120" font-size="11" fill="#0066cc" font-weight="bold">F gravitaire</text>
    </g>

    <!-- Tibia anterior shear (moderate) -->
    <g id="shear-normal">
      <defs>
        <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <polygon points="0 0, 10 3, 0 6" fill="#ff9900"/>
        </marker>
      </defs>
      <line x1="200" y1="180" x2="260" y2="180" stroke="#ff9900" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
      <text x="240" y="200" font-size="10" fill="#ff9900" font-weight="bold">Shear tibia</text>
    </g>

    <!-- LCA tension (normal) -->
    <rect x="120" y="220" width="210" height="80" fill="#e6f2ff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="140" y="245" font-size="11" font-weight="bold" fill="#003366">Tension LCA : MODÉRÉE</text>
    <text x="140" y="265" font-size="10" fill="#003366">• Force antéro-tibiale : ~30-40% F grav</text>
    <text x="140" y="280" font-size="10" fill="#003366">• LCA absorbe ~70% shear force</text>
    <text x="140" y="295" font-size="10" fill="#003366">• Risque rupture : FAIBLE (~1.2% par an)</text>
  </g>

  <!-- === SCENARIO 2: ELEVATED PTS (≥12°) === -->
  <g id="elevated-pts">
    <text x="675" y="80" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff6600">
      Élevé : PTS ≥ 12°
    </text>

    <!-- Tibia profile (steeper) -->
    <line x1="570" y1="150" x2="800" y2="220" stroke="#999" stroke-width="3"/>
    <line x1="570" y1="150" x2="830" y2="150" stroke="#0066cc" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- Femur -->
    <ellipse cx="650" cy="100" rx="25" ry="40" fill="#e8d4c4" stroke="#333" stroke-width="2"/>

    <!-- LCA (more anterior) -->
    <line x1="640" y1="140" x2="595" y2="210" stroke="#cc0000" stroke-width="4" stroke-linecap="round"/>
    <text x="595" y="135" font-size="12" fill="#cc0000" font-weight="bold">LCA</text>

    <!-- Force vectors -->
    <!-- Gravitational + muscular force -->
    <line x1="650" y1="80" x2="650" y2="160" stroke="#0066cc" stroke-width="3" marker-end="url(#arrowhead-blue)"/>
    <text x="660" y="120" font-size="11" fill="#0066cc" font-weight="bold">F gravitaire</text>

    <!-- Tibia anterior shear (MUCH LARGER) -->
    <line x1="650" y1="220" x2="750" y2="220" stroke="#ff6600" stroke-width="4" marker-end="url(#arrowhead-orange)"/>
    <text x="720" y="245" font-size="11" fill="#ff6600" font-weight="bold">Shear tibia ↑↑</text>

    <!-- Angle annotation -->
    <path d="M 600 150 Q 630 165 650 200" fill="none" stroke="#ff6600" stroke-width="2"/>
    <text x="620" y="175" font-size="12" font-weight="bold" fill="#ff6600">↑ angle</text>

    <!-- LCA tension (elevated) -->
    <rect x="570" y="280" width="210" height="80" fill="#ffe6e6" stroke="#ff6600" stroke-width="2" rx="5"/>
    <text x="590" y="305" font-size="11" font-weight="bold" fill="#cc0000">Tension LCA : ÉLEVÉE ⚠</text>
    <text x="590" y="325" font-size="10" fill="#660000">• Force antéro-tibiale : ~60-80% F grav</text>
    <text x="590" y="340" font-size="10" fill="#660000">• LCA absorbe ~95%+ shear force</text>
    <text x="590" y="355" font-size="10" fill="#660000">• Risque rupture : OR 2.3 (vs normal)</text>
  </g>

  <!-- === MAQUET FORMULA EXPLANATION === -->
  <g id="maquet-formula">
    <rect x="50" y="420" width="800" height="250" fill="#f5f5f5" stroke="#333" stroke-width="2" rx="8"/>

    <text x="70" y="450" font-size="14" font-weight="bold" fill="#1a1a1a">FORMULE BIOMÉCANIQUE (Maquet, 1976) :</text>

    <!-- Formula -->
    <rect x="70" y="465" width="760" height="50" fill="#ffffff" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="90" y="492" font-family="monospace" font-size="16" font-weight="bold" fill="#0066cc">
      F_shear_tibiale = W × sin(θ)   où W = charge corporelle, θ = angle PTS
    </text>

    <!-- Example calculations -->
    <text x="70" y="540" font-size="12" font-weight="bold" fill="#1a1a1a">Exemple numérique (poids = 80 kg, charge sur genou = 1.5× poids):</text>

    <text x="90" y="565" font-size="11" fill="#1a1a1a">
      • PTS = 7°  →  F = 120 kg × sin(7°) = 120 × 0.122 = <tspan font-weight="bold" fill="#0066cc">14.6 kg shear</tspan>  (LCA absorbe ~70%)
    </text>

    <text x="90" y="585" font-size="11" fill="#1a1a1a">
      • PTS = 12° →  F = 120 kg × sin(12°) = 120 × 0.208 = <tspan font-weight="bold" fill="#ff6600">25.0 kg shear</tspan>  (LCA absorbe ~95%)
    </text>

    <text x="90" y="605" font-size="11" fill="#1a1a1a">
      • <tspan font-weight="bold" fill="#ff6600">Augmentation relative : +71% force shear</tspan> (12° vs 7°) → <tspan font-weight="bold" fill="#cc0000">Risque rupture OR 2.3</tspan>
    </text>

    <text x="70" y="640" font-size="11" font-style="italic" fill="#666">
      ℹ La pente augmente la composante de force antéro-postérieure, requérant une tension LCA plus élevée pour stabiliser.
    </text>
  </g>

  <!-- Legend -->
  <g id="legend">
    <text x="50" y="690" font-size="10" font-weight="bold" fill="#333">
      Sources : Maquet 1976 (biomécanique), Brandon 2006 (risque rupture), Howell 2019 (validation clinique)
    </text>
  </g>
</svg>