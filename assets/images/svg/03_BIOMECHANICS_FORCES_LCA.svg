<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Titre -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Biomécanique : Forces de Cisaillement vs Angle PTS
  </text>

  <!-- Scenario 1: Normal (7°) -->
  <g>
    <text x="200" y="90" font-size="18" font-weight="bold" fill="#2ecc71">PTS = 7° (Normal)</text>
    <line x1="80" y1="250" x2="320" y2="200" stroke="#333" stroke-width="8"/>
    <path d="M 250 240 Q 280 235 300 215" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <text x="320" y="245" font-size="12" fill="#e74c3c">7°</text>
    <line x1="200" y1="180" x2="200" y2="300" stroke="#3498db" stroke-width="4" marker-end="url(#arrowblue)"/>
    <text x="210" y="245" font-size="12" fill="#3498db">P</text>
    <line x1="200" y1="300" x2="280" y2="330" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowgreen)"/>
    <text x="295" y="335" font-size="11" fill="#27ae60">F_n = P×cos(7°) = 0.99P</text>
    <line x1="200" y1="300" x2="245" y2="310" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowred)"/>
    <text x="250" y="330" font-size="11" fill="#e74c3c">F_cis = P×sin(7°) = 0.12P</text>
    <rect x="100" y="380" width="200" height="60" fill="#e8f8f5" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="200" y="405" font-size="12" font-weight="bold" text-anchor="middle" fill="#27ae60">Tension LCA</text>
    <text x="200" y="428" font-size="14" font-weight="bold" text-anchor="middle" fill="#2ecc71">⬇ Minimale</text>
  </g>

  <!-- Scenario 2: Elevated (15°) -->
  <g>
    <text x="1000" y="90" font-size="18" font-weight="bold" fill="#e74c3c">PTS = 15° (Élevé)</text>
    <line x1="880" y1="150" x2="1120" y2="200" stroke="#333" stroke-width="8"/>
    <path d="M 980 190 Q 1020 175 1080 210" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <text x="1120" y="195" font-size="12" fill="#e74c3c">15°</text>
    <line x1="1000" y1="80" x2="1000" y2="200" stroke="#3498db" stroke-width="4" marker-end="url(#arrowblue)"/>
    <text x="1010" y="145" font-size="12" fill="#3498db">P</text>
    <line x1="1000" y1="200" x2="1055" y2="235" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowgreen)"/>
    <text x="1070" y="240" font-size="11" fill="#27ae60">F_n = P×cos(15°) = 0.97P</text>
    <line x1="1000" y1="200" x2="1135" y2="220" stroke="#e74c3c" stroke-width="4" marker-end="url(#arrowred)"/>
    <text x="1050" y="250" font-size="11" fill="#e74c3c">F_cis = P×sin(15°) = 0.26P</text>
    <rect x="900" y="380" width="200" height="60" fill="#fadbd8" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="1000" y="405" font-size="12" font-weight="bold" text-anchor="middle" fill="#e74c3c">Tension LCA</text>
    <text x="1000" y="428" font-size="14" font-weight="bold" text-anchor="middle" fill="#c0392b">⬆⬆ 2.2× Plus élevée!</text>
  </g>

  <!-- Graphique comparatif -->
  <g>
    <text x="600" y="550" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Augmentation Cisaillement vs PTS</text>
    <line x1="150" y1="650" x2="1050" y2="650" stroke="#333" stroke-width="2"/>
    <line x1="150" y1="650" x2="150" y2="500" stroke="#333" stroke-width="2"/>
    <text x="1080" y="660" font-size="12" fill="#333">PTS (°)</text>
    <text x="130" y="480" font-size="12" fill="#333">Cisaillement</text>
    <text x="200" y="670" font-size="10" fill="#666">7°</text>
    <text x="550" y="670" font-size="10" fill="#666">12°</text>
    <text x="900" y="670" font-size="10" fill="#666">20°</text>
    <polyline points="200,630 350,600 550,550 700,500 900,450" stroke="#e74c3c" stroke-width="3" fill="none"/>
    <circle cx="200" cy="630" r="5" fill="#2ecc71"/>
    <text x="200" y="695" font-size="10" text-anchor="middle" fill="#2ecc71" font-weight="bold">0.12P</text>
    <circle cx="550" cy="550" r="5" fill="#f39c12"/>
    <text x="550" y="695" font-size="10" text-anchor="middle" fill="#f39c12" font-weight="bold">0.21P</text>
    <circle cx="900" cy="450" r="5" fill="#e74c3c"/>
    <text x="900" y="695" font-size="10" text-anchor="middle" fill="#e74c3c" font-weight="bold">0.34P</text>
  </g>

  <!-- Légende -->
  <rect x="50" y="720" width="1100" height="70" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/>
  <text x="600" y="745" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Formule Maquet : F_cisaillement = P × sin(θ) où θ = angle PTS
  </text>
  <text x="600" y="770" font-size="12" text-anchor="middle" fill="#34495e">
    À PTS=12° : risque rupture LCA × 2.3 (OR Brandon 2006) | À PTS=15° : × 4
  </text>
</svg>
