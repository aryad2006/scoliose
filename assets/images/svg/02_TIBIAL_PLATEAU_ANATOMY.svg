<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Title -->
  <text x="400" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Anatomie du Plateau Tibial — Vues Coronales et Sagittales
  </text>

  <!-- === CORONAL VIEW (LEFT) === -->
  <g id="coronal-view">
    <!-- Title -->
    <text x="200" y="70" font-size="16" font-weight="bold" text-anchor="middle" fill="#003366">Vue Coronale (frontale)</text>

    <!-- Tibial plateau outline -->
    <ellipse cx="200" cy="180" rx="120" ry="40" fill="#e8d4c4" stroke="#333" stroke-width="2"/>

    <!-- Medial condyle -->
    <ellipse cx="140" cy="180" rx="50" ry="35" fill="#d4c4b4" stroke="#333" stroke-width="2"/>

    <!-- Lateral condyle -->
    <ellipse cx="260" cy="180" rx="50" ry="35" fill="#d4c4b4" stroke="#333" stroke-width="2"/>

    <!-- Intercondylar region -->
    <rect x="180" y="160" width="40" height="40" fill="#f0e8e0" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Medial slope (normal) -->
    <line x1="140" y1="215" x2="130" y2="250" stroke="#0066cc" stroke-width="3"/>
    <text x="115" y="240" font-size="11" fill="#0066cc" font-weight="bold">Pente normale</text>

    <!-- Lateral slope (PTS) -->
    <line x1="260" y1="215" x2="275" y2="250" stroke="#ff6600" stroke-width="3"/>
    <text x="275" y="240" font-size="11" fill="#ff6600" font-weight="bold">PTS</text>

    <!-- ACL attachment zones -->
    <circle cx="200" cy="170" r="6" fill="#cc0000" stroke="#660000" stroke-width="1"/>
    <text x="200" y="155" font-size="10" fill="#cc0000" font-weight="bold" text-anchor="middle">LCA</text>

    <!-- PCL attachment -->
    <circle cx="200" cy="190" r="5" fill="#0099cc" stroke="#003366" stroke-width="1"/>
    <text x="215" y="195" font-size="10" fill="#0099cc" font-weight="bold">LCP</text>

    <!-- Tibial shaft -->
    <polygon points="160,250 240,250 235,320 165,320" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  </g>

  <!-- === SAGITTAL VIEW (RIGHT) === -->
  <g id="sagittal-view">
    <!-- Title -->
    <text x="600" y="70" font-size="16" font-weight="bold" text-anchor="middle" fill="#003366">Vue Sagittale (profil)</text>

    <!-- Posterior slope line (normal) -->
    <line x1="480" y1="160" x2="680" y2="200" stroke="#0066cc" stroke-width="4" stroke-linecap="round"/>
    <text x="480" y="155" font-size="11" fill="#0066cc" font-weight="bold">Normal 7°±3°</text>

    <!-- Posterior slope line (elevated PTS) -->
    <line x1="480" y1="160" x2="720" y2="220" stroke="#ff6600" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <text x="490" y="230" font-size="11" fill="#ff6600" font-weight="bold">Élevé (≥12°)</text>

    <!-- Horizontal reference -->
    <line x1="450" y1="160" x2="750" y2="160" stroke="#999" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="760" y="165" font-size="10" fill="#666">Horizontal</text>

    <!-- Femoral condyle outline -->
    <arc-path d="M 520 130 Q 600 120 700 130" fill="none" stroke="#ddd" stroke-width="3"/>

    <!-- LCA attachment -->
    <circle cx="500" cy="165" r="5" fill="#cc0000" stroke="#660000" stroke-width="1"/>
    <text x="490" y="150" font-size="9" fill="#cc0000" font-weight="bold">Tibial LCA</text>

    <!-- Posterior cortex reference -->
    <line x1="480" y1="240" x2="680" y2="240" stroke="#0066cc" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="700" y="245" font-size="9" fill="#0066cc">Cortex post.</text>

    <!-- Tibial shaft -->
    <polygon points="480,240 470,350 490,350 500,240" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  </g>

  <!-- === INFORMATION BOX === -->
  <rect x="50" y="400" width="700" height="170" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="8"/>

  <text x="60" y="425" font-size="13" font-weight="bold" fill="#003366">ÉLÉMENTS ANATOMIQUES CLÉS :</text>

  <text x="60" y="450" font-size="11" fill="#003366">
    • <tspan font-weight="bold">Condyles tibiales</tspan> : Médiale (≈20mm hauteur) vs Latérale (≈12mm) → inclinaison naturelle
  </text>

  <text x="60" y="470" font-size="11" fill="#003366">
    • <tspan font-weight="bold">Pente tibiale postérieure (PTS)</tspan> : Angle entre plateau tibial et axe long tibia
  </text>

  <text x="60" y="490" font-size="11" fill="#003366">
    • <tspan font-weight="bold">Zone LCA</tspan> : Insertion antéro-médiale sur plateau tibial (emplacement critique pour stabilité)
  </text>

  <text x="60" y="510" font-size="11" fill="#003366">
    • <tspan font-weight="bold">Variation ethnique</tspan> : Caucasiens PTS 7°±2° vs Asiatiques 8.5°±2.5° (plus de pente)
  </text>

  <text x="60" y="530" font-size="11" fill="#003366">
    • <tspan font-weight="bold">Mesure fiable</tspan> : Radiographie conventionnelle (Dejour) ICC=0.88 vs 3D-IRM ICC=0.95
  </text>

  <text x="60" y="550" font-size="11" fill="#003366">
    ➜ PTS augmentée → forces tibiales antérieures ↑ → stress LCA ↑ → risque rupture OR 2.3 (Brandon 2006)
  </text>
</svg>