<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <text x="600" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Anatomie Plateau Tibial — Vue Coronale et Sagittale
  </text>

  <!-- VUE CORONALE (front view) -->
  <g>
    <text x="300" y="80" font-size="14" font-weight="bold" fill="#34495e">Vue Coronale (Face)</text>
    
    <!-- Contours condyles -->
    <ellipse cx="220" cy="200" rx="35" ry="50" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <ellipse cx="380" cy="200" rx="35" ry="50" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <text x="220" y="210" font-size="11" text-anchor="middle" fill="#34495e">Condyle médial</text>
    <text x="380" y="210" font-size="11" text-anchor="middle" fill="#34495e">Condyle latéral</text>
    
    <!-- Zone articulaire -->
    <path d="M 220 150 Q 300 140 380 150" stroke="#2980b9" stroke-width="3" fill="none"/>
    
    <!-- Pente (presque verticale en vue coronale) -->
    <line x1="220" y1="150" x2="220" y2="250" stroke="#e74c3c" stroke-width="2"/>
    <line x1="380" y1="150" x2="380" y2="250" stroke="#e74c3c" stroke-width="2"/>
    <text x="160" y="200" font-size="9" fill="#e74c3c">Pente mini</text>
    
    <!-- Ménisques (gris) -->
    <ellipse cx="220" cy="160" rx="20" ry="12" fill="#bdc3c7" opacity="0.6"/>
    <ellipse cx="380" cy="160" rx="20" ry="12" fill="#bdc3c7" opacity="0.6"/>
    <text x="300" y="180" font-size="9" text-anchor="middle" fill="#7f8c8d">Ménisques</text>
    
    <!-- Attaches ligamentaires -->
    <circle cx="220" cy="250" r="5" fill="#9b59b6"/>
    <circle cx="380" cy="250" r="5" fill="#9b59b6"/>
    <text x="300" y="280" font-size="10" text-anchor="middle" fill="#9b59b6">Zones attaches ligamentaires</text>
  </g>

  <!-- VUE SAGITTALE (côté) -->
  <g>
    <text x="900" y="80" font-size="14" font-weight="bold" fill="#34495e">Vue Sagittale (Côté) — IMPORTANTE</text>
    
    <!-- Contour tibial -->
    <path d="M 800 150 L 950 180 L 950 280 L 800 290 Z" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    
    <!-- Surface plateau (pente PTS) -->
    <line x1="800" y1="150" x2="950" y2="180" stroke="#2980b9" stroke-width="4"/>
    <text x="875" y="145" font-size="11" fill="#2980b9">Surface plateau (PTS inclinée)</text>    
    
    <!-- Cortex postérieur (repère Dejour) -->
    <line x1="800" y1="150" x2="800" y2="290" stroke="#e74c3c" stroke-width="3"/>
    <text x="760" y="220" font-size="10" fill="#e74c3c">Cortex post</text>
    
    <!-- Ménisque en vue lat -->
    <ellipse cx="875" cy="200" rx="40" ry="25" fill="#bdc3c7" opacity="0.6"/>
    <text x="875" y="210" font-size="9" text-anchor="middle" fill="#2c3e50">Ménisque</text>
    
    <!-- Angle PTS annotation -->
    <path d="M 950 280 A 40 40 0 0 0 880 270" stroke="#27ae60" stroke-width="2" fill="none"/>
    <text x="930" y="320" font-size="12" font-weight="bold" fill="#27ae60">θ PTS ~7-8°</text>
    
    <!-- Attaches LCA (antérieur) -->
    <circle cx="920" cy="190" r="6" fill="#3498db"/>
    <line x1="920" y1="190" x2="970" y2="150" stroke="#3498db" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="960" y="165" font-size="9" fill="#3498db">Attache fém LCA</text>
    
    <!-- Attache tibia (antérieur) -->
    <circle cx="900" cy="250" r="6" fill="#3498db"/>
    <text x="930" y="255" font-size="9" fill="#3498db">Attache tibia LCA</text>
  </g>

  <!-- Anatomie détaillée -->
  <g>
    <rect x="50" y="450" width="1100" height="320" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="5"/>
    
    <text x="600" y="480" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Structures Anatomiques Clés</text>
    
    <!-- Col 1 -->
    <text x="70" y="510" font-size="11" font-weight="bold" fill="#2c3e50">Plateau Tibial :</text>
    <text x="70" y="530" font-size="10" fill="#34495e">• Surface articulaire légèrement inclinée (PTS)</text>
    <text x="70" y="548" font-size="10" fill="#34495e">• Condyle médial &gt; condyle latéral</text>
    <text x="70" y="566" font-size="10" fill="#34495e">• Pente antéro-postérieure 7-8° normal</text>
    <text x="70" y="584" font-size="10" fill="#34495e">• Inclinaison (valgus genou) en vue coronale</text>
    
    <!-- Col 2 -->
    <text x="420" y="510" font-size="11" font-weight="bold" fill="#2c3e50">Ménisques :</text>
    <text x="420" y="530" font-size="10" fill="#34495e">• Médial : attache solide, mobile limité</text>
    <text x="420" y="548" font-size="10" fill="#34495e">• Latéral : plus mobile (attaché LCA)</text>
    <text x="420" y="566" font-size="10" fill="#34495e">• Rôle : absorption chocs, stabilité</text>
    <text x="420" y="584" font-size="10" fill="#34495e">• Épaisseur ~3-4mm améliore stabilité</text>
    
    <!-- Col 3 -->
    <text x="770" y="510" font-size="11" font-weight="bold" fill="#2c3e50">Ligament croisé antérieur (LCA) :</text>
    <text x="770" y="530" font-size="10" fill="#34495e">• Attache fémorale : condyle médial externe</text>
    <text x="770" y="548" font-size="10" fill="#34495e">• Attache tibiale : aires 1 &amp; 2 intercondylienne</text>
    <text x="770" y="566" font-size="10" fill="#34495e">• Longueur ~35mm, tension variable</text>
    <text x="770" y="584" font-size="10" fill="#34495e">• Tension AUGMENTÉE si PTS élevée</text>

    <!-- Légende -->
    <text x="70" y="620" font-size="10" font-weight="bold" fill="#e74c3c">IMPACT PTS ÉLEVÉE :</text>
    <text x="70" y="638" font-size="10" fill="#34495e">Pente >12° accroit force cisaillement sur LCA = × 2.3 risque rupture (Brandon 2006) | Pente élevée augmente charge ménisque</text>
    <text x="70" y="654" font-size="10" fill="#34495e">Relation géométrique directe : F_cis = P × sin(PTS) où P = poids corporel. À 100kg et PTS 15° : F_cis ≈ 26kg vs 12kg à PTS 7°</text>
    
    <text x="70" y="680" font-size="10" font-weight="bold" fill="#27ae60">IMPLICATION CHIRURGICALE :</text>
    <text x="70" y="698" font-size="10" fill="#34495e">Si PTS >12° : correction (déflexion) recommandée avant ou pendant reconstruction LCA | Cible post-op : 7-8° (Dejour technique)</text>
    <text x="70" y="714" font-size="10" fill="#34495e">Ostéotomie réduction PTS ~3-4° | Temps supplémentaire ~30-45 minutes | Résultats : re-rupture 15% vs 25-30% sans correction</text>
  </g>
</svg>
