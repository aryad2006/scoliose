<svg width="600" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <!-- Title -->
  <text x="300" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Angle de Pente Tibiale (PTS) — Mesure Radiologique
  </text>

  <!-- Background -->
  <rect width="600" height="500" fill="#f9f9f9"/>

  <!-- Tibia lateral view -->
  <g id="tibia">
    <!-- Tibial plateau (posterior slope) -->
    <line x1="150" y1="200" x2="350" y2="240" stroke="#333" stroke-width="3" stroke-linecap="round"/>

    <!-- Posterior cortex (reference) -->
    <line x1="150" y1="200" x2="350" y2="200" stroke="#0066cc" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- Tibial shaft -->
    <polygon points="150,200 140,450 160,450 170,200" fill="#cccccc" stroke="#333" stroke-width="2"/>

    <!-- Joint line -->
    <line x1="140" y1="200" x2="360" y2="240" stroke="#ff6600" stroke-width="2"/>
  </g>

  <!-- Angle arc -->
  <path d="M 200 200 Q 220 210 250 230" fill="none" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>

  <!-- Angle measurement annotations -->
  <text x="220" y="185" font-size="14" fill="#0066cc" font-weight="bold">Horizontal (référence)</text>

  <text x="280" y="270" font-size="14" fill="#ff6600" font-weight="bold">Plateau tibial (pente)</text>

  <!-- Angle label -->
  <text x="240" y="225" font-size="18" fill="#cc0000" font-weight="bold">θ (PTS)</text>

  <!-- Normal range box -->
  <rect x="50" y="320" width="500" height="140" fill="#e8f4f8" stroke="#0066cc" stroke-width="2" rx="5"/>

  <text x="60" y="345" font-size="14" font-weight="bold" fill="#003366">MESURE PTS (angle postérieur tibial) :</text>

  <text x="60" y="365" font-size="12" fill="#003366">
    ✓ Normal : 7° ± 3° (Dejour, Weber)
  </text>

  <text x="60" y="385" font-size="12" fill="#003366">
    ⚠ Élevé (≥12°) : Risque rupture LCA augmenté (OR 2.3, Brandon 2006)
  </text>

  <text x="60" y="405" font-size="12" fill="#003366">
    ✓ Méthode Dejour : Cortex postérieur vs plan horizontal
  </text>

  <text x="60" y="425" font-size="12" fill="#003366">
    ✓ ICC mesure radiographique : 0.88-0.95 (excellent intra-observer)
  </text>

  <text x="60" y="445" font-size="12" fill="#003366">
    ℹ Variation ethnique : Asiatiques +1.5° vs Caucasiens (Hashemi 2008)
  </text>

  <!-- Legend -->
  <line x1="50" y1="475" x2="70" y2="475" stroke="#ff6600" stroke-width="2"/>
  <text x="75" y="480" font-size="11" fill="#333">Joint articulaire (pente)</text>
</svg>