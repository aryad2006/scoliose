<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <text x="600" y="40" font-size="26" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Mesure Angle PTS — Méthode Dejour
  </text>

  <!-- Illustration tibia en vue sagittale -->
  <g>
    <text x="300" y="90" font-size="16" font-weight="bold" fill="#34495e">Vue Sagittale — Radiographie Latérale</text>
    
    <!-- Contour tibia -->
    <ellipse cx="200" cy="250" rx="45" ry="80" fill="none" stroke="#34495e" stroke-width="3"/>
    
    <!-- Cortex postérieur (repère Dejour) -->
    <line x1="155" y1="170" x2="155" y2="330" stroke="#e74c3c" stroke-width="3"/>
    <text x="120" y="250" font-size="12" font-weight="bold" fill="#e74c3c">Cortex post</text>
    
    <!-- Plateau tibial (surface) -->
    <line x1="140" y1="210" x2="260" y2="245" stroke="#2980b9" stroke-width="4"/>
    
    <!-- Ligne horizontale de référence -->
    <line x1="80" y1="320" x2="320" y2="320" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="340" y="325" font-size="11" fill="#95a5a6">Référence horizontale</text>
    
    <!-- Angle PTS avec arc -->
    <path d="M 260 320 A 30 30 0 0 0 240 280" stroke="#27ae60" stroke-width="2" fill="none"/>
    <text x="275" y="305" font-size="14" font-weight="bold" fill="#27ae60">θ = PTS</text>
    
    <!-- Annotations -->
    <circle cx="155" cy="170" r="4" fill="#e74c3c"/>
    <circle cx="260" cy="245" r="4" fill="#2980b9"/>
    <circle cx="155" cy="320" r="4" fill="#95a5a6"/>
  </g>

  <!-- Échelle de PTS normale -->
  <g>
    <text x="900" y="90" font-size="16" font-weight="bold" fill="#34495e">Valeurs Cliniques Normales</text>
    
    <!-- Barre verte: normal -->
    <rect x="800" y="130" width="200" height="40" fill="#e8f8f5" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="900" y="155" font-size="12" font-weight="bold" text-anchor="middle" fill="#27ae60">PTS: 0-10°</text>
    <text x="900" y="175" font-size="11" text-anchor="middle" fill="#27ae60">NORMAL (moyenne 7±3°)</text>

    <!-- Barre orange: borderline -->
    <rect x="800" y="210" width="200" height="40" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="5"/>
    <text x="900" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#f39c12">PTS: 10-12°</text>
    <text x="900" y="255" font-size="11" text-anchor="middle" fill="#f39c12">BORDERLINE (surveillance)</text>

    <!-- Barre rouge: élevé -->
    <rect x="800" y="290" width="200" height="40" fill="#fadbd8" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="900" y="315" font-size="12" font-weight="bold" text-anchor="middle" fill="#e74c3c">PTS: >12°</text>
    <text x="900" y="335" font-size="11" text-anchor="middle" fill="#e74c3c">ÉLEVÉ (risque rupture ×2.3)</text>
  </g>

  <!-- Méthode Dejour détaillée -->
  <g>
    <rect x="50" y="420" width="1100" height="320" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="5"/>
    
    <text x="600" y="450" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
      Technique Dejour de Mesure sur Radiographie Latérale
    </text>

    <text x="70" y="485" font-size="12" font-weight="bold" fill="#2c3e50">Étapes :</text>
    
    <text x="70" y="510" font-size="11" fill="#34495e">
      1. Identifier le CORTEX POSTÉRIEUR du tibia sur la radiographie latérale
    </text>
    <text x="90" y="530" font-size="10" fill="#555">
      → C'est la limite postérieure de l'os cortical du tibia (bord arrière dense)
    </text>
    
    <text x="70" y="560" font-size="11" fill="#34495e">
      2. Tracer une ligne HORIZONTALE (référence)
    </text>
    <text x="90" y="580" font-size="10" fill="#555">
      → Perpendiculaire à l'axe mécanique, à travers le plateau tibial
    </text>
    
    <text x="70" y="610" font-size="11" fill="#34495e">
      3. Tracer une ligne LE LONG du cortex postérieur
    </text>
    <text x="90" y="630" font-size="10" fill="#555">
      → Direction antéropostérieure du tibia proximal
    </text>
    
    <text x="70" y="660" font-size="11" fill="#34495e">
      4. Mesurer l'angle entre ces deux lignes = ANGLE PTS
    </text>
    <text x="90" y="680" font-size="10" fill="#555">
      → Angle positif = pente postérieure (normal), angle négatif = pente antérieure (rare)
    </text>

    <text x="70" y="710" font-size="11" font-weight="bold" fill="#e74c3c">
      ⚠️ Précision : ICC = 0.88 (radiographie) vs 0.95 (IRM 3D). Variabilité opérateur ±1-2°
    </text>
  </g>

  <!-- Légende -->
  <rect x="50" y="760" width="1100" height="30" fill="#fff3cd" stroke="#f39c12" stroke-width="1" rx="3"/>
  <text x="600" y="782" font-size="11" text-anchor="middle" fill="#34495e">
    Valeurs normatives : 7° ± 3° (population générale). Variation génétique et ethnique faible (&lt;1°).
  </text>
</svg>
