<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <!-- Title -->
  <text x="500" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Courbes de Survie Prothèse de Genou — Registres Nationaux & Meta-Analyses
  </text>

  <!-- Define gradient for survival zones -->
  <defs>
    <linearGradient id="survivalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#99ff99;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffff99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9999;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- AXES LABELS -->
  <text x="30" y="620" font-size="12" font-weight="bold" fill="#333">Survie (%)</text>
  <text x="500" y="670" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Années post-implantation</text>

  <!-- Y-AXIS SCALE (100% to 0%) -->
  <line x1="100" y1="100" x2="100" y2="600" stroke="#333" stroke-width="2"/>
  <line x1="95" y1="100" x2="100" y2="100" stroke="#333" stroke-width="1"/>
  <text x="85" y="105" font-size="10" text-anchor="end" fill="#333">100%</text>

  <line x1="95" y1="200" x2="100" y2="200" stroke="#333" stroke-width="1"/>
  <text x="85" y="205" font-size="10" text-anchor="end" fill="#333">80%</text>

  <line x1="95" y1="300" x2="100" y2="300" stroke="#333" stroke-width="1"/>
  <text x="85" y="305" font-size="10" text-anchor="end" fill="#333">60%</text>

  <line x1="95" y1="400" x2="100" y2="400" stroke="#333" stroke-width="1"/>
  <text x="85" y="405" font-size="10" text-anchor="end" fill="#333">40%</text>

  <line x1="95" y1="500" x2="100" y2="500" stroke="#333" stroke-width="1"/>
  <text x="85" y="505" font-size="10" text-anchor="end" fill="#333">20%</text>

  <line x1="95" y1="600" x2="100" y2="600" stroke="#333" stroke-width="1"/>
  <text x="85" y="605" font-size="10" text-anchor="end" fill="#333">0%</text>

  <!-- X-AXIS SCALE (0 to 20 years) -->
  <line x1="100" y1="600" x2="950" y2="600" stroke="#333" stroke-width="2"/>

  <line x1="100" y1="600" x2="100" y2="605" stroke="#333" stroke-width="1"/>
  <text x="100" y="625" font-size="10" text-anchor="middle" fill="#333">0</text>

  <line x1="265" y1="600" x2="265" y2="605" stroke="#333" stroke-width="1"/>
  <text x="265" y="625" font-size="10" text-anchor="middle" fill="#333">5</text>

  <line x1="430" y1="600" x2="430" y2="605" stroke="#333" stroke-width="1"/>
  <text x="430" y="625" font-size="10" text-anchor="middle" fill="#333">10</text>

  <line x1="595" y1="600" x2="595" y2="605" stroke="#333" stroke-width="1"/>
  <text x="595" y="625" font-size="10" text-anchor="middle" fill="#333">15</text>

  <line x1="760" y1="600" x2="760" y2="605" stroke="#333" stroke-width="1"/>
  <text x="760" y="625" font-size="10" text-anchor="middle" fill="#333">20</text>

  <!-- GRID LINES -->
  <line x1="100" y1="200" x2="950" y2="200" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="300" x2="950" y2="300" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="400" x2="950" y2="400" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="500" x2="950" y2="500" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- === SURVIVAL CURVE 1: Swedish Registry (Modern, high-volume) === -->
  <polyline points="100,105 265,125 430,155 595,190 760,235 925,290" fill="none" stroke="#0066cc" stroke-width="3" stroke-linecap="round"/>
  <text x="930" y="290" font-size="11" font-weight="bold" fill="#0066cc">Swedish</text>
  <text x="930" y="305" font-size="9" fill="#0066cc">Reg. (modern)</text>

  <!-- === SURVIVAL CURVE 2: British Registry (Mid-range) === -->
  <polyline points="100,110 265,135 430,170 595,215 760,270 925,330" fill="none" stroke="#ff9900" stroke-width="3" stroke-linecap="round"/>
  <text x="930" y="330" font-size="11" font-weight="bold" fill="#ff9900">British Reg.</text>

  <!-- === SURVIVAL CURVE 3: Christensen MA 2017 (Meta-analysis) === -->
  <polyline points="100,115 265,140 430,175 595,225 760,285 925,355" fill="none" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
  <text x="930" y="355" font-size="11" font-weight="bold" fill="#cc0000">Meta-analysis</text>
  <text x="930" y="370" font-size="9" fill="#cc0000">Christensen 2017</text>

  <!-- === SURVIVAL CURVE 4: rKA (Rivière 2020, recent data) === -->
  <polyline points="100,100 265,120 430,150 595,185 760,230 925,270" fill="none" stroke="#009900" stroke-width="3" stroke-linecap="round" stroke-dasharray="5,5"/>
  <text x="930" y="270" font-size="11" font-weight="bold" fill="#009900">rKA (Rivière</text>
  <text x="930" y="285" font-size="9" fill="#009900">2020, promising)</text>

  <!-- === ANNOTATION ZONES === -->
  <!-- Excellent zone (95%+ survie @ 10 ans) -->
  <rect x="100" y="100" width="330" height="250" fill="url(#survivalGrad)" opacity="0.2"/>
  <text x="115" y="125" font-size="10" font-weight="bold" fill="#003300">Excellent</text>
  <text x="115" y="140" font-size="9" fill="#003300">(95%+ @ 10y)</text>

  <!-- Good zone (92-95% @ 10 ans) -->
  <rect x="430" y="100" width="165" height="250" fill="url(#survivalGrad)" opacity="0.4"/>
  <text x="445" y="125" font-size="10" font-weight="bold" fill="#663300">Good</text>
  <text x="445" y="140" font-size="9" fill="#663300">(92-95% @ 10y)</text>

  <!-- Fair zone (85-92% @ 10 ans) -->
  <rect x="595" y="100" width="165" height="250" fill="url(#survivalGrad)" opacity="0.6"/>
  <text x="610" y="125" font-size="10" font-weight="bold" fill="#663300">Fair</text>
  <text x="610" y="140" font-size="9" fill="#663300">(85-92% @ 10y)</text>

  <!-- === KEY FINDINGS BOX === -->
  <rect x="50" y="650" width="900" height="35" fill="#f0f8ff" stroke="#0066cc" stroke-width="2" rx="5"/>

  <text x="70" y="673" font-size="11" fill="#003366">
    <tspan font-weight="bold">→ Survie moyenne : 92-96% @ 20 ans</tspan> |
    <tspan font-weight="bold">rKA (cinématique restreint) :</tspan> 95%+ prometteur |
    <tspan font-weight="bold">Révision rate :</tspan> 0.5-1% / an
  </text>

  <!-- === DETAILED STATISTICS BOX === -->
  <g id="stats">
    <rect x="50" y="50" width="200" height="500" fill="#fff9e6" stroke="#ff9900" stroke-width="2" rx="5"/>

    <text x="70" y="75" font-size="11" font-weight="bold" fill="#663300">STATISTIQUES CLÉS :</text>

    <text x="70" y="100" font-size="9" fill="#333" font-weight="bold">Swedish Registry :</text>
    <text x="70" y="115" font-size="8" fill="#333">• 95% @ 10 ans</text>
    <text x="70" y="127" font-size="8" fill="#333">• 90% @ 20 ans</text>
    <text x="70" y="139" font-size="8" fill="#333">• Volume effect +</text>

    <text x="70" y="160" font-size="9" fill="#333" font-weight="bold">Christensen MA :</text>
    <text x="70" y="175" font-size="8" fill="#333">• 92-96% @ 20 ans</text>
    <text x="70" y="187" font-size="8" fill="#333">• 46 studies analysed</text>
    <text x="70" y="199" font-size="8" fill="#333">• Modern designs</text>

    <text x="70" y="220" font-size="9" fill="#333" font-weight="bold">Australian Reg. :</text>
    <text x="70" y="235" font-size="8" fill="#333">• 93% @ 15 ans</text>
    <text x="70" y="247" font-size="8" fill="#333">• Revised 7%</text>

    <text x="70" y="268" font-size="9" fill="#333" font-weight="bold">Rivière rKA 2020 :</text>
    <text x="70" y="283" font-size="8" fill="#333">• 95%+ early</text>
    <text x="70" y="295" font-size="8" fill="#333">• Patient satisfaction ↑</text>
    <text x="70" y="307" font-size="8" fill="#333">• Cinématique naturelle</text>

    <text x="70" y="328" font-size="9" fill="#333" font-weight="bold">Failure causes (top 3) :</text>
    <text x="70" y="343" font-size="8" fill="#333">1. Aseptic loosening (40%)</text>
    <text x="70" y="355" font-size="8" fill="#333">2. Infection (20%)</text>
    <text x="70" y="367" font-size="8" fill="#333">3. Instability (15%)</text>

    <text x="70" y="388" font-size="9" fill="#333" font-weight="bold">Revision outcomes :</text>
    <text x="70" y="403" font-size="8" fill="#333">• 1st revision : 85% @ 10y</text>
    <text x="70" y="415" font-size="8" fill="#333">• 2nd revision : 60% @ 5y</text>

    <text x="70" y="436" font-size="9" fill="#333" font-weight="bold">Patient factors ↑ risk :</text>
    <text x="70" y="451" font-size="8" fill="#333">• Age < 55 years (↑ activity)</text>
    <text x="70" y="463" font-size="8" fill="#333">• High BMI (>35)</text>
    <text x="70" y="475" font-size="8" fill="#333">• Poor alignment (>3°)</text>
    <text x="70" y="487" font-size="8" fill="#333">• Component malalignment</text>
    <text x="70" y="499" font-size="8" fill="#333">• Preoperative OA grade 4</text>

    <text x="70" y="520" font-size="8" font-style="italic" fill="#666">
      Source : Christensen et al. Acta Orthop 2017; Rivière NP guidelines 2020
    </text>
  </g>
</svg>